<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zion Church — Dashboard Global</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Brygada+1918:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js" crossorigin></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'Montserrat',sans-serif;background:#202020;color:#FCFCEB}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#043030}
::-webkit-scrollbar-thumb{background:#078780;border-radius:2px}
select option{background:#043030;color:#FCFCEB}
.font-display{font-family:'Brygada 1918',serif}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0}to{opacity:1}}
.fade-up{animation:fadeUp .4s ease forwards}
.skeleton{background:rgba(12,81,73,.4);border-radius:6px;animation:pulse 1.5s ease infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const { useState, useEffect, useMemo, useRef, useCallback } = React;
const {
  AreaChart, Area, LineChart, Line, BarChart, Bar, RadarChart, Radar,
  PolarGrid, PolarAngleAxis, PolarRadiusAxis, PieChart, Pie, Cell,
  XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
  ReferenceLine, LabelList
} = Recharts;

// ─── BRAND ───────────────────────────────────────────────────────────────────
const B = {
  deepGreen:'#043030', teal:'#078780', midGreen:'#0C5149',
  sage:'#439B6A', cream:'#FCFCEB', sand:'#E5E4C1', ice:'#9EDEDC',
  black:'#202020', amber:'#E5C07B', red:'#E06C75'
};

const TIER_COLORS = {
  Black:   {bg:'#078780', text:'#FCFCEB'},
  Diamond: {bg:'#9EDEDC', text:'#043030'},
  Platinum:{bg:'#E5E4C1', text:'#043030'},
  Gold:    {bg:'#E5C07B', text:'#043030'},
  Silver:  {bg:'rgba(252,252,235,.15)', text:'#FCFCEB', border:'rgba(252,252,235,.3)'},
};

const LOCATIONS = [
  {id:'sao-paulo',      name:'São Paulo',      country:'Brasil',  flag:'🇧🇷', tier:'Black'},
  {id:'campinas',       name:'Campinas',       country:'Brasil',  flag:'🇧🇷', tier:'Gold'},
  {id:'recife',         name:'Recife',         country:'Brasil',  flag:'🇧🇷', tier:'Gold'},
  {id:'jundiai',        name:'Jundiaí',        country:'Brasil',  flag:'🇧🇷', tier:'Gold'},
  {id:'lisboa',         name:'Lisboa',         country:'Portugal',flag:'🇵🇹', tier:'Gold'},
  {id:'ribeirao-preto', name:'Ribeirão Preto', country:'Brasil',  flag:'🇧🇷', tier:'Silver'},
  {id:'maceio',         name:'Maceió',         country:'Brasil',  flag:'🇧🇷', tier:'Silver'},
  {id:'santos',         name:'Santos',         country:'Brasil',  flag:'🇧🇷', tier:'Silver'},
  {id:'campo-grande',   name:'Campo Grande',   country:'Brasil',  flag:'🇧🇷', tier:'Silver'},
  {id:'vale-do-ribeira',name:'Vale do Ribeira',country:'Brasil',  flag:'🇧🇷', tier:'Silver'},
  {id:'porto',          name:'Porto',          country:'Portugal',flag:'🇵🇹', tier:'Silver'},
  {id:'quito',          name:'Quito',          country:'Ecuador', flag:'🇪🇨', tier:'Silver'},
  {id:'cuenca',         name:'Cuenca',         country:'Ecuador', flag:'🇪🇨', tier:'Silver'},
  {id:'santiago',       name:'Santiago',       country:'Chile',   flag:'🇨🇱', tier:'Silver'},
  {id:'miami',          name:'Miami',          country:'EUA',     flag:'🇺🇸', tier:'Silver'},
  {id:'orlando',        name:'Orlando',        country:'EUA',     flag:'🇺🇸', tier:'Silver'},
];

const LINE_COLORS = [
  '#078780','#439B6A','#9EDEDC','#FCFCEB','#E5E4C1',
  '#5BA8A0','#7BC4A0','#B0E8E6','#D4D4A8','#A8C8A0',
  '#3D7870','#2D6850','#70C4C0','#ECD8B8','#C8C8A0','#1D5840'
];

const COUNTRY_COLORS = {Brasil:'#078780',Portugal:'#439B6A',Ecuador:'#9EDEDC',Chile:'#E5E4C1',EUA:'#FCFCEB'};

const METRICS = [
  {id:'cultos',label:'Cultos'},{id:'links',label:'Links'},
  {id:'pessoas_links',label:'Pessoas em Links'},{id:'voluntarios',label:'Voluntários'},
  {id:'raizes',label:'Raízes'},{id:'batismo',label:'Batismo nas Águas'},
  {id:'zao',label:'ZAO'},{id:'presenca_digital',label:'Presença Digital'},
];

const SEMESTERS = ['2026-S1','2025-S2','2025-S1','2024-S2','2024-S1'];

// ─── MOCK DATA GENERATOR ─────────────────────────────────────────────────────
const BASE = {
  'sao-paulo':      {m:1.00,g:[1.00,1.09,1.19,1.28,1.38]},
  'campinas':       {m:0.82,g:[1.00,1.10,1.22,1.35,1.48]},
  'recife':         {m:0.75,g:[1.00,1.08,1.17,1.26,1.36]},
  'jundiai':        {m:0.60,g:[1.00,1.12,1.26,1.40,1.55]},
  'lisboa':         {m:0.55,g:[1.00,1.07,1.14,1.22,1.30]},
  'ribeirao-preto': {m:0.45,g:[1.00,1.11,1.24,1.38,1.53]},
  'maceio':         {m:0.40,g:[1.00,1.09,1.20,1.32,1.45]},
  'santos':         {m:0.38,g:[1.00,1.06,1.12,1.19,1.26]},
  'campo-grande':   {m:0.35,g:[1.00,1.13,1.28,1.44,1.62]},
  'vale-do-ribeira':{m:0.28,g:[1.00,1.08,1.16,1.25,1.35]},
  'porto':          {m:0.32,g:[1.00,1.05,1.10,1.16,1.22]},
  'quito':          {m:0.42,g:[1.00,1.14,1.30,1.48,1.68]},
  'cuenca':         {m:0.25,g:[1.00,1.10,1.22,1.35,1.50]},
  'santiago':       {m:0.30,g:[1.00,1.07,1.15,1.23,1.32]},
  'miami':          {m:0.48,g:[1.00,1.10,1.22,1.35,1.50]},
  'orlando':        {m:0.35,g:[1.00,1.08,1.18,1.28,1.40]},
};

const SP_BASE = {cultos:1850,links:85,pessoas_links:920,voluntarios:520,raizes:45,batismo:22,zao:380,ig:48000,yt:12000};
const SEM_IDX = {'2024-S1':0,'2024-S2':1,'2025-S1':2,'2025-S2':3,'2026-S1':4};
const MONTHS_SEMS = {
  '2024-S1':[{m:'Jan',mn:1,y:2024},{m:'Fev',mn:2,y:2024},{m:'Mar',mn:3,y:2024},{m:'Abr',mn:4,y:2024},{m:'Mai',mn:5,y:2024},{m:'Jun',mn:6,y:2024}],
  '2024-S2':[{m:'Jul',mn:7,y:2024},{m:'Ago',mn:8,y:2024},{m:'Set',mn:9,y:2024},{m:'Out',mn:10,y:2024},{m:'Nov',mn:11,y:2024},{m:'Dez',mn:12,y:2024}],
  '2025-S1':[{m:'Jan',mn:1,y:2025},{m:'Fev',mn:2,y:2025},{m:'Mar',mn:3,y:2025},{m:'Abr',mn:4,y:2025},{m:'Mai',mn:5,y:2025},{m:'Jun',mn:6,y:2025}],
  '2025-S2':[{m:'Jul',mn:7,y:2025},{m:'Ago',mn:8,y:2025},{m:'Set',mn:9,y:2025},{m:'Out',mn:10,y:2025},{m:'Nov',mn:11,y:2025},{m:'Dez',mn:12,y:2025}],
  '2026-S1':[{m:'Jan',mn:1,y:2026},{m:'Fev',mn:2,y:2026},{m:'Mar',mn:3,y:2026},{m:'Abr',mn:4,y:2026}],
};

function jitter(v){return Math.round(v*(1+(Math.random()-.5)*.1));}
function getVal(locId,baseKey,sem){
  const idx=SEM_IDX[sem]??2;
  return Math.max(0,jitter(Math.round(SP_BASE[baseKey]*(BASE[locId]?.m??0.4)*(BASE[locId]?.g[idx]??1))));
}

function buildData(){
  const cultos={},links={},pessoas={},vol={},raizes={},bat={},zao={},ig={},yt={};
  const monthly={}; // {locId:{sem:{label:val}}}

  for(const sem of SEMESTERS){
    for(const loc of LOCATIONS){
      const id=loc.id;
      if(!cultos[id]) cultos[id]={};
      if(!links[id]) links[id]={};
      if(!pessoas[id]) pessoas[id]={};
      if(!vol[id]) vol[id]={};
      if(!raizes[id]) raizes[id]={};
      if(!bat[id]) bat[id]={};
      if(!zao[id]) zao[id]={};
      if(!ig[id]) ig[id]={};
      if(!yt[id]) yt[id]={};
      if(!monthly[id]) monthly[id]={};

      const months=MONTHS_SEMS[sem]||[];
      let cTotal=0,lTotal=0,pTotal=0,vTotal=0,rTotal=0,bTotal=0,zTotal=0,igTotal=0,ytTotal=0;
      const mvs=[.9,.95,1,.95,1.05,.98];

      months.forEach(({m,mn,y},i)=>{
        const mv=mvs[i]??1;
        const key=`${y}-${String(mn).padStart(2,'0')}`;
        if(!monthly[id][key]) monthly[id][key]={label:`${m}/${y}`};
        const cv=jitter(Math.round(getVal(id,'cultos',sem)*mv*4));
        cTotal+=cv;
        monthly[id][key].cultos=(monthly[id][key].cultos||0)+cv;
        monthly[id][key].pessoas_links=(monthly[id][key].pessoas_links||0)+jitter(Math.round(getVal(id,'pessoas_links',sem)*mv));
        monthly[id][key].voluntarios=(monthly[id][key].voluntarios||0)+jitter(Math.round(getVal(id,'voluntarios',sem)*mv));
        lTotal+=jitter(Math.round(getVal(id,'links',sem)*mv));
        pTotal+=jitter(Math.round(getVal(id,'pessoas_links',sem)*mv));
        vTotal+=jitter(Math.round(getVal(id,'voluntarios',sem)*mv));
        rTotal+=jitter(Math.round(getVal(id,'raizes',sem)*mv));
        bTotal+=jitter(Math.round(getVal(id,'batismo',sem)*mv));
        zTotal+=jitter(Math.round(getVal(id,'zao',sem)*mv));
        igTotal+=jitter(Math.round(getVal(id,'ig',sem)*mv));
        ytTotal+=jitter(Math.round(getVal(id,'yt',sem)*mv));
      });

      cultos[id][sem]=cTotal;
      links[id][sem]=lTotal;
      pessoas[id][sem]=pTotal;
      vol[id][sem]=vTotal;
      raizes[id][sem]=rTotal;
      bat[id][sem]=bTotal;
      zao[id][sem]=zTotal;
      ig[id][sem]=igTotal;
      yt[id][sem]=ytTotal;
    }
  }

  return {cultos,links,pessoas,vol,raizes,bat,zao,ig,yt,monthly};
}

const DATA = buildData();

function getMetricData(metric,sem){
  const d={cultos:DATA.cultos,links:DATA.links,pessoas_links:DATA.pessoas,
    voluntarios:DATA.vol,raizes:DATA.raizes,batismo:DATA.bat,zao:DATA.zao}[metric];
  if(!d) return {};
  const res={};
  for(const loc of LOCATIONS) res[loc.id]=(d[loc.id]||{})[sem]||0;
  return res;
}

function getPrevSem(s){
  const [y,h]=s.split('-S').map(Number);
  return h===1?`${y-1}-S2`:`${y}-S1`;
}

function delta(curr,prev){
  if(!prev||prev===0) return 0;
  return ((curr-prev)/prev)*100;
}

function fmtNum(v){
  if(v>=1e6) return `${(v/1e6).toFixed(1)}M`;
  if(v>=1000) return `${(v/1000).toFixed(1)}K`;
  return v.toLocaleString('pt-BR');
}
function fmtDelta(d){return `${d>0?'+':''}${d.toFixed(1)}%`;}
function statusColor(d){return d>=0?B.sage:B.red;}

// ─── BRAND COMPONENTS ────────────────────────────────────────────────────────
function ZionLogo({size=36}){
  const c=B.teal, tc=B.cream;
  return (
    <div style={{display:'flex',alignItems:'center',gap:10}}>
      <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="18" stroke={c} strokeWidth="2" fill="none"/>
        <path d="M8 28 L15 16 L20 22 L24 14 L32 28 Z" fill={c}/>
        <circle cx="20" cy="20" r="18" stroke={c} strokeWidth="1.5" fill="none" opacity=".3"/>
      </svg>
      <span style={{fontFamily:'Montserrat',fontWeight:600,fontSize:Math.round(size*.38),letterSpacing:'.25em',color:tc,lineHeight:1}}>ZION</span>
    </div>
  );
}

function TierBadge({tier,small}){
  const c=TIER_COLORS[tier]||TIER_COLORS.Silver;
  return (
    <span style={{background:c.bg,color:c.text,border:c.border?`1px solid ${c.border}`:undefined,
      padding:small?'3px 8px':'4px 10px',borderRadius:4,fontSize:small?9:10,
      fontFamily:'Montserrat',fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',
      display:'inline-block',lineHeight:1.4,whiteSpace:'nowrap'}}>
      {tier}
    </span>
  );
}

function TierDot({tier}){
  const c=TIER_COLORS[tier]||TIER_COLORS.Silver;
  return <span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:c.bg,border:c.border?`1px solid ${c.border}`:undefined,flexShrink:0}}/>;
}

function StatusDot({d}){
  const c=d>=0?B.sage:d>=-20?B.amber:B.red;
  return <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:c}}/>;
}

function HeroShapes({opacity=.08}){
  return (
    <svg width="360" height="260" viewBox="0 0 360 260" fill="none"
      style={{position:'absolute',right:0,top:0,pointerEvents:'none',opacity}}>
      <circle cx="300" cy="40" r="110" fill={B.teal}/>
      <path d="M360 130 A140 140 0 0 1 220 270 L360 270 Z" fill={B.teal}/>
      <circle cx="180" cy="180" r="55" stroke={B.teal} strokeWidth="2" fill="none"/>
    </svg>
  );
}

// ─── CHARTS ──────────────────────────────────────────────────────────────────
function ZionTooltip({active,payload,label}){
  if(!active||!payload?.length) return null;
  return (
    <div style={{background:B.deepGreen,border:`1px solid ${B.teal}`,borderRadius:8,padding:'10px 14px',fontFamily:'Montserrat'}}>
      <p style={{color:'rgba(252,252,235,.6)',fontSize:11,marginBottom:6}}>{label}</p>
      {payload.map((p,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:p.color,display:'inline-block'}}/>
          <span style={{color:B.cream,fontSize:12,fontWeight:500}}>{p.name}: {Number(p.value).toLocaleString('pt-BR')}</span>
        </div>
      ))}
    </div>
  );
}

function SparkLine({data,color=B.teal}){
  const d=data.map((v,i)=>({i,v}));
  return (
    <ResponsiveContainer width="100%" height={36}>
      <LineChart data={d}>
        <Line type="monotone" dataKey="v" stroke={color} strokeWidth={1.8} dot={false} isAnimationActive={false}/>
      </LineChart>
    </ResponsiveContainer>
  );
}

function AreaChartZ({data,series,xKey='date',height=260}){
  return (
    <ResponsiveContainer width="100%" height={height}>
      <AreaChart data={data} margin={{top:10,right:10,bottom:0,left:0}}>
        <defs>
          {series.map(s=>(
            <linearGradient key={s.key} id={`g-${s.key}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={s.color} stopOpacity={.2}/>
              <stop offset="100%" stopColor={s.color} stopOpacity={0}/>
            </linearGradient>
          ))}
        </defs>
        <CartesianGrid strokeDasharray="3 3" stroke="rgba(252,252,235,.06)" vertical={false}/>
        <XAxis dataKey={xKey} tick={{fill:'rgba(252,252,235,.4)',fontSize:11,fontFamily:'Montserrat'}} axisLine={false} tickLine={false} tickFormatter={v=>typeof v==='string'?v.substring(0,7):v}/>
        <YAxis tick={{fill:'rgba(252,252,235,.4)',fontSize:11,fontFamily:'Montserrat'}} axisLine={false} tickLine={false} width={44} tickFormatter={v=>v>=1000?`${(v/1000).toFixed(0)}K`:v}/>
        <Tooltip content={<ZionTooltip/>}/>
        {series.length>1&&<Legend wrapperStyle={{fontFamily:'Montserrat',fontSize:11,color:'rgba(252,252,235,.6)'}}/>}
        {series.map(s=>(
          <Area key={s.key} type="monotone" dataKey={s.key} name={s.label} stroke={s.color} strokeWidth={2.5} fill={`url(#g-${s.key})`} dot={false} activeDot={{r:4}}/>
        ))}
      </AreaChart>
    </ResponsiveContainer>
  );
}

function LineChartZ({data,series,xKey='date',height=260}){
  return (
    <ResponsiveContainer width="100%" height={height}>
      <LineChart data={data} margin={{top:10,right:20,bottom:0,left:0}}>
        <CartesianGrid strokeDasharray="3 3" stroke="rgba(252,252,235,.06)" vertical={false}/>
        <XAxis dataKey={xKey} tick={{fill:'rgba(252,252,235,.4)',fontSize:11,fontFamily:'Montserrat'}} axisLine={false} tickLine={false} tickFormatter={v=>typeof v==='string'?v.substring(0,7):v}/>
        <YAxis tick={{fill:'rgba(252,252,235,.4)',fontSize:11,fontFamily:'Montserrat'}} axisLine={false} tickLine={false} width={44} tickFormatter={v=>v>=1000?`${(v/1000).toFixed(0)}K`:v}/>
        <Tooltip content={<ZionTooltip/>}/>
        <Legend wrapperStyle={{fontFamily:'Montserrat',fontSize:11,color:'rgba(252,252,235,.5)'}}/>
        {series.map((s,i)=>(
          <Line key={s.key} type="monotone" dataKey={s.key} name={s.label} stroke={s.color||LINE_COLORS[i%LINE_COLORS.length]} strokeWidth={s.dashed?1.5:2} strokeDasharray={s.dashed?'6 4':undefined} dot={false} activeDot={{r:4}}/>
        ))}
      </LineChart>
    </ResponsiveContainer>
  );
}

function BarChartZ({data,horizontal,height=280,showDelta,avg}){
  const getC=(v)=>showDelta?(v>=0?B.sage:B.red):(v>=(avg||0)?B.teal:B.midGreen);
  if(horizontal){
    return (
      <ResponsiveContainer width="100%" height={Math.max(height,data.length*34)}>
        <BarChart data={data} layout="vertical" margin={{top:0,right:70,bottom:0,left:0}}>
          <CartesianGrid strokeDasharray="3 3" stroke="rgba(252,252,235,.06)" horizontal={false}/>
          <XAxis type="number" tick={{fill:'rgba(252,252,235,.4)',fontSize:11,fontFamily:'Montserrat'}} axisLine={false} tickLine={false} tickFormatter={v=>showDelta?`${v>0?'+':''}${v.toFixed(0)}%`:v>=1000?`${(v/1000).toFixed(0)}K`:v}/>
          <YAxis dataKey="name" type="category" tick={{fill:'rgba(252,252,235,.7)',fontSize:11,fontFamily:'Montserrat'}} axisLine={false} tickLine={false} width={120}/>
          <Tooltip content={<ZionTooltip/>}/>
          {showDelta&&<ReferenceLine x={0} stroke="rgba(252,252,235,.25)" strokeDasharray="4 4"/>}
          {!showDelta&&avg!==undefined&&<ReferenceLine x={avg} stroke="rgba(252,252,235,.2)" strokeDasharray="4 4"/>}
          <Bar dataKey="value" radius={[0,4,4,0]} maxBarSize={22}>
            {data.map((e,i)=><Cell key={i} fill={e.color||getC(e.value)}/>)}
            <LabelList dataKey="value" position="right" formatter={v=>showDelta?`${v>0?'+':''}${v.toFixed(1)}%`:fmtNum(v)} style={{fill:'rgba(252,252,235,.6)',fontSize:10,fontFamily:'Montserrat'}}/>
          </Bar>
        </BarChart>
      </ResponsiveContainer>
    );
  }
  return (
    <ResponsiveContainer width="100%" height={height}>
      <BarChart data={data} margin={{top:10,right:10,bottom:0,left:0}}>
        <CartesianGrid strokeDasharray="3 3" stroke="rgba(252,252,235,.06)" vertical={false}/>
        <XAxis dataKey="name" tick={{fill:'rgba(252,252,235,.4)',fontSize:11}} axisLine={false} tickLine={false}/>
        <YAxis tick={{fill:'rgba(252,252,235,.4)',fontSize:11}} axisLine={false} tickLine={false} width={44} tickFormatter={v=>v>=1000?`${(v/1000).toFixed(0)}K`:v}/>
        <Tooltip content={<ZionTooltip/>}/>
        <Bar dataKey="value" radius={[4,4,0,0]} maxBarSize={40}>
          {data.map((e,i)=><Cell key={i} fill={e.color||getC(e.value)}/>)}
        </Bar>
      </BarChart>
    </ResponsiveContainer>
  );
}

function DonutChartZ({data,height=240}){
  const total=data.reduce((s,d)=>s+d.value,0);
  const flags={Brasil:'🇧🇷',Portugal:'🇵🇹',Ecuador:'🇪🇨',Chile:'🇨🇱',EUA:'🇺🇸'};
  const RADIAN=Math.PI/180;
  const lbl=({cx,cy,midAngle,innerRadius,outerRadius,percent})=>{
    if(percent<.05) return null;
    const r=innerRadius+(outerRadius-innerRadius)*.5;
    return <text x={cx+r*Math.cos(-midAngle*RADIAN)} y={cy+r*Math.sin(-midAngle*RADIAN)} fill={B.cream} textAnchor="middle" dominantBaseline="central" style={{fontFamily:'Montserrat',fontSize:12,fontWeight:500}}>{`${(percent*100).toFixed(0)}%`}</text>;
  };
  return (
    <div style={{display:'flex',alignItems:'center',gap:32,flexWrap:'wrap'}}>
      <ResponsiveContainer width={height} height={height} minWidth={height}>
        <PieChart>
          <Pie data={data} cx="50%" cy="50%" innerRadius={height*.28} outerRadius={height*.44} dataKey="value" labelLine={false} label={lbl}>

function GaugeSVG({value,max=1,label,size=110}){
  const pct=Math.min(value/max,1);
  const cx=size/2,cy=size*.6,r=size*.38;
  const arcPath=(from,to,radius)=>{
    const x1=cx+radius*Math.cos(from),y1=cy+radius*Math.sin(from);
    const x2=cx+radius*Math.cos(to),y2=cy+radius*Math.sin(to);
    const lg=Math.abs(to-from)>Math.PI?1:0;
    return `M ${x1} ${y1} A ${radius} ${radius} 0 ${lg} 1 ${x2} ${y2}`;
  };
  const filledTo=Math.PI-pct*Math.PI;
  const nAngle=Math.PI-pct*Math.PI;
  const nx=cx+(r*.75)*Math.cos(nAngle),ny=cy+(r*.75)*Math.sin(nAngle);
  const c=pct>=.75?B.sage:pct>=.25?B.amber:B.red;
  return (
    <div style={{textAlign:'center'}}>
      <svg width={size} height={size*.65} viewBox={`0 0 ${size} ${size*.65}`}>
        <path d={arcPath(Math.PI,0,r)} stroke="rgba(252,252,235,.08)" strokeWidth={size*.09} fill="none" strokeLinecap="round"/>
        <path d={arcPath(Math.PI,filledTo,r)} stroke={c} strokeWidth={size*.09} fill="none" strokeLinecap="round"/>
        <line x1={cx} y1={cy} x2={nx} y2={ny} stroke={B.cream} strokeWidth={1.5} strokeLinecap="round" opacity=".8"/>
        <circle cx={cx} cy={cy} r={size*.04} fill={B.cream} opacity=".8"/>
        <text x={cx} y={cy-size*.12} textAnchor="middle" style={{fontFamily:'"Brygada 1918",serif',fontWeight:700,fontSize:size*.22,fill:B.cream}}>
          {`${(value*100).toFixed(0)}%`}
        </text>
      </svg>
      <p style={{fontFamily:'Montserrat',fontSize:10,color:'rgba(252,252,235,.55)',textTransform:'uppercase',letterSpacing:'.06em',marginTop:2}}>{label}</p>
    </div>
  );
}

function HeatmapViz({locId,months}){
  const data=[];
  for(const loc of LOCATIONS){
    for(const m of months){
      let v=0;
      const rows=DATA.monthly[loc.id]||{};
      const row=rows[m];
      if(row) v=locId==='cultos'?(row.cultos||0):locId==='pessoas_links'?(row.pessoas_links||0):(row.voluntarios||0);
      data.push({locId:loc.id,locName:loc.name,flag:loc.flag,month:m,value:v});
    }
  }
  const vals=data.map(d=>d.value).filter(v=>v>0);
  const minV=Math.min(...vals)||0,maxV=Math.max(...vals)||1;
  function interp(v){
    const t=(v-minV)/(maxV-minV);
    if(t<.5){const u=t*2;return `rgb(${Math.round(4+8*u)},${Math.round(48+33*u)},${Math.round(48+25*u)})`;}
    const u=(t-.5)*2;return `rgb(${Math.round(12-5*u)},${Math.round(81+54*u)},${Math.round(73+55*u)})`;
  }
  const byLoc={};
  for(const d of data){
    if(!byLoc[d.locId]) byLoc[d.locId]={flag:d.flag,name:d.locName};
    byLoc[d.locId][d.month]=d.value;
  }
  const short=m=>m.substring(5,7)+'/'+m.substring(2,4);
  return (
    <div style={{overflowX:'auto'}}>
      <table style={{borderCollapse:'collapse',width:'100%',fontFamily:'Montserrat',minWidth:600}}>
        <thead>
          <tr>
            <th style={{padding:'8px 12px',textAlign:'left',background:B.deepGreen,color:'rgba(252,252,235,.5)',fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',minWidth:140,position:'sticky',left:0,zIndex:2}}>Localidade</th>
            {months.map(m=><th key={m} style={{padding:'8px 6px',textAlign:'center',background:B.deepGreen,color:'rgba(252,252,235,.5)',fontSize:10,textTransform:'uppercase',minWidth:62}}>{short(m)}</th>)}
          </tr>
        </thead>
        <tbody>
          {LOCATIONS.map((loc,ri)=>(
            <tr key={loc.id} style={{background:ri%2===0?'transparent':'rgba(12,81,73,.15)'}}>
              <td style={{padding:'7px 12px',position:'sticky',left:0,background:ri%2===0?'#202020':'rgba(12,81,73,.3)',color:'rgba(252,252,235,.8)',fontSize:12,zIndex:1}}>{loc.flag} {loc.name}</td>
              {months.map(m=>{
                const v=(byLoc[loc.id]||{})[m]||0;
                return <td key={m} style={{padding:'5px',textAlign:'center',background:v>0?interp(v):'rgba(4,48,48,.5)'}}>
                  <span style={{color:B.cream,fontSize:10,fontWeight:500}}>{v>0?fmtNum(v):'—'}</span>
                </td>;
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function useCountUp(target){
  const [v,setV]=useState(0);
  const raf=useRef(null),t0=useRef(null);
  useEffect(()=>{
    t0.current=null;
    const anim=(ts)=>{
      if(!t0.current) t0.current=ts;
      const p=Math.min((ts-t0.current)/1200,1);
      const e=1-Math.pow(1-p,3);
      setV(Math.round(target*e));
      if(p<1) raf.current=requestAnimationFrame(anim);
    };
    raf.current=requestAnimationFrame(anim);
    return ()=>{if(raf.current) cancelAnimationFrame(raf.current);};
  },[target]);
  return v;
}

      } else {
        const src={cultos:DATA.cultos,links:DATA.links,pessoas_links:DATA.pessoas,voluntarios:DATA.vol,raizes:DATA.raizes,batismo:DATA.bat,zao:DATA.zao}[m.id]||{};
        for(const loc of LOCATIONS){curr+=(src[loc.id]||{})[sem]||0;pv+=(src[loc.id]||{})[prev]||0;}
      }
      const spark=[getPrevSem(prev),prev,sem].map(s=>{
        let v=0;
        if(m.id==='presenca_digital'){for(const loc of LOCATIONS){v+=(DATA.ig[loc.id]||{})[s]||0;}}
        else {const src={cultos:DATA.cultos,links:DATA.links,pessoas_links:DATA.pessoas,voluntarios:DATA.vol,raizes:DATA.raizes,batismo:DATA.bat,zao:DATA.zao}[m.id]||{};for(const loc of LOCATIONS)v+=(src[loc.id]||{})[s]||0;}

      return {id:m.id,label:m.label,value:curr,prev:pv,delta:delta(curr,pv),spark};

    const map={};

// METRIC PAGE
function PageMetric({metricId,sem}){
  const metric=METRICS.find(m=>m.id===metricId)||METRICS[0];
  const prev=getPrevSem(sem);

  const rows=useMemo(()=>{
    const currData=getMetricData(metricId,sem);
    const prevData=getMetricData(metricId,prev);
    return LOCATIONS.map(loc=>({
      ...loc, curr:currData[loc.id]||0, prev:prevData[loc.id]||0,
      d:delta(currData[loc.id]||0,prevData[loc.id]||0)
    })).sort((a,b)=>b.curr-a.curr);
  },[metricId,sem]);

  const total=rows.reduce((s,r)=>s+r.curr,0);
  const prevTotal=rows.reduce((s,r)=>s+r.prev,0);
  const totalDelta=delta(total,prevTotal);
  const avg=total/rows.length;

  const trendData=useMemo(()=>{
    const map={};
    for(const loc of LOCATIONS){
      const monthly=DATA.monthly[loc.id]||{};
      for(const [k,v] of Object.entries(monthly)){
        if(!map[k]) map[k]={date:k};
        if(metricId==='cultos') map[k][loc.id]=(map[k][loc.id]||0)+(v.cultos||0);
        else if(metricId==='pessoas_links') map[k][loc.id]=(map[k][loc.id]||0)+(v.pessoas_links||0);
        else if(metricId==='voluntarios') map[k][loc.id]=(map[k][loc.id]||0)+(v.voluntarios||0);
      }
    }
    if(!Object.keys(map).length) return [];
    return Object.values(map).sort((a,b)=>a.date.localeCompare(b.date)).slice(-16);
  },[metricId]);

  const top3=rows.slice(0,3);
  const rankData=rows.map(r=>({name:`${r.flag} ${r.name}`,value:r.curr,color:r.curr>=avg?B.teal:B.midGreen}));

  const lineSeries=rows.slice(0,6).map((r,i)=>({key:r.id,label:`${r.flag} ${r.name}`,color:LINE_COLORS[i]}));
  lineSeries.push({key:'_avg',label:'Média Rede',color:'rgba(252,252,235,.3)',dashed:true});

  const trendWithAvg=trendData.map(row=>{
    const vals=LOCATIONS.map(l=>row[l.id]||0).filter(v=>v>0);
    return {...row,_avg:vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0};
  });

  return (
    <div>
      <div style={{padding:'28px 32px',background:'linear-gradient(135deg,#043030 0%,#078780 100%)',position:'relative',overflow:'hidden'}}>
        <HeroShapes opacity={.06}/>
        <p style={{fontFamily:'Montserrat',fontSize:11,letterSpacing:'.1em',textTransform:'uppercase',color:'rgba(252,252,235,.6)',marginBottom:6}}>Métrica</p>
        <h1 style={{fontFamily:'"Brygada 1918",serif',fontWeight:700,fontSize:40,color:B.cream,margin:0}}>{metric.label}</h1>
        <div style={{display:'flex',alignItems:'baseline',gap:16,marginTop:10}}>
          <span style={{fontFamily:'"Brygada 1918",serif',fontSize:30,fontWeight:700,color:B.ice}}>{fmtNum(total)}</span>
          <span style={{fontFamily:'Montserrat',fontSize:14,color:totalDelta>=0?B.sage:B.red,fontWeight:500}}>{totalDelta>=0?'↑':'↓'} {Math.abs(totalDelta).toFixed(1)}% SoS</span>
        </div>
      </div>

      <div style={{padding:'32px 32px 48px'}}>
        <Section title="Top 3 Localidades">
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:16}}>
            {top3.map((r,i)=><PodiumCard key={r.id} rank={i+1} loc={r} value={r.curr} d={r.d} label={metric.label}/>)}
          </div>
        </Section>

        {trendData.length>0&&(
          <Section title="Tendência por Localidade">
            <Card style={{background:B.deepGreen}}>
              <LineChartZ data={trendWithAvg} series={lineSeries}/>
            </Card>
          </Section>
        )}

        <Section title={`Ranking — ${metric.label}`}>
          <Card style={{background:B.deepGreen}}>
            <BarChartZ data={rankData} horizontal avg={avg}/>
          </Card>
        </Section>

        <Section title="Tabela Detalhada">
          <div style={{borderRadius:12,border:'1px solid rgba(7,135,128,.2)',overflow:'hidden'}}>
            <table style={{borderCollapse:'collapse',width:'100%',fontFamily:'Montserrat'}}>
              <thead><tr style={{background:B.deepGreen}}>
                <th style={{padding:'10px 16px',textAlign:'left',fontSize:11,color:'rgba(252,252,235,.5)',textTransform:'uppercase',letterSpacing:'.08em'}}>Localidade</th>
                <th style={{padding:'10px 12px',textAlign:'left',fontSize:11,color:'rgba(252,252,235,.5)',textTransform:'uppercase',letterSpacing:'.08em'}}>Tier</th>
                <th style={{padding:'10px 12px',textAlign:'right',fontSize:11,color:'rgba(252,252,235,.5)',textTransform:'uppercase',letterSpacing:'.08em'}}>{metric.label}</th>
                <th style={{padding:'10px 12px',textAlign:'right',fontSize:11,color:'rgba(252,252,235,.5)',textTransform:'uppercase',letterSpacing:'.08em'}}>Sem. Ant.</th>
                <th style={{padding:'10px 12px',textAlign:'right',fontSize:11,color:'rgba(252,252,235,.5)',textTransform:'uppercase',letterSpacing:'.08em'}}>Variação</th>
              </tr></thead>
              <tbody>
                {rows.map((r,i)=>(
                  <tr key={r.id} style={{background:i%2===0?'transparent':'rgba(12,81,73,.2)',transition:'background .15s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(7,135,128,.08)'}
                    onMouseLeave={e=>e.currentTarget.style.background=i%2===0?'transparent':'rgba(12,81,73,.2)'}>
                    <td style={{padding:'9px 16px',color:B.cream,fontSize:13,fontWeight:500}}>{r.flag} {r.name}</td>
                    <td style={{padding:'9px 12px'}}><TierBadge tier={r.tier} small/></td>
                    <td style={{padding:'9px 12px',textAlign:'right',color:B.cream,fontSize:13,fontWeight:600}}>{fmtNum(r.curr)}</td>
                    <td style={{padding:'9px 12px',textAlign:'right',color:'rgba(252,252,235,.5)',fontSize:12}}>{fmtNum(r.prev)}</td>
                    <td style={{padding:'9px 12px',textAlign:'right',fontSize:12,fontWeight:500,color:r.d>=0?B.sage:B.red}}>{r.d>=0?'↑':'↓'} {fmtDelta(Math.abs(r.d))}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Section>
      </div>
    </div>
  );
}

            <h2 style={{fontFamily:'"Brygada 1918",serif',fontSize:20,fontWeight:600,color:B.cream,marginBottom:16}}>Posição no Ranking</h2>

// STRATEGIC RATES
function PageRates({sem}){
  const prev=getPrevSem(sem);
  const data=useMemo(()=>LOCATIONS.map(loc=>{
    const c=(DATA.cultos[loc.id]||{})[sem]||1;
    const l=(DATA.links[loc.id]||{})[sem]||1;
    const p=(DATA.pessoas[loc.id]||{})[sem]||0;
    const v=(DATA.vol[loc.id]||{})[sem]||0;
    const r=(DATA.raizes[loc.id]||{})[sem]||0;
    const b=(DATA.bat[loc.id]||{})[sem]||0;
    return {...loc, conexao:p/c, formacao:r/c, servico:v/c, conversao:b/c, densidade:p/l};
  }),[sem]);

  const nets={conexao:data.reduce((s,d)=>s+d.conexao,0)/data.length, formacao:data.reduce((s,d)=>s+d.formacao,0)/data.length, servico:data.reduce((s,d)=>s+d.servico,0)/data.length, conversao:data.reduce((s,d)=>s+d.conversao,0)/data.length, densidade:data.reduce((s,d)=>s+d.densidade,0)/data.length};

  const rateMeta=[
    {id:'conexao',label:'Taxa de Conexão',desc:'Pessoas em Links ÷ Cultos'},
    {id:'formacao',label:'Taxa de Formação',desc:'Raízes ÷ Cultos'},
    {id:'servico',label:'Taxa de Serviço',desc:'Voluntários ÷ Cultos'},
    {id:'conversao',label:'Taxa de Conversão',desc:'Batismo ÷ Cultos'},
    {id:'densidade',label:'Densidade de Links',desc:'Pessoas ÷ Links'},
  ];

  function statusColor2(val,all){const s=[...all].sort((a,b)=>a-b);const q3=s[Math.floor(s.length*.75)];const q1=s[Math.floor(s.length*.25)];return val>=q3?B.sage:val>=q1?B.amber:B.red;}

  return (
    <div>
      <div style={{padding:'28px 32px',background:'linear-gradient(135deg,#043030 0%,#0C5149 100%)'}}>
        <h1 style={{fontFamily:'"Brygada 1918",serif',fontWeight:700,fontSize:40,color:B.cream,margin:0}}>Taxas Estratégicas</h1>
        <p style={{fontFamily:'Montserrat',fontSize:13,color:'rgba(252,252,235,.55)',marginTop:6}}>Indicadores de saúde operacional · {sem}</p>
      </div>
      <div style={{padding:'32px 32px 48px'}}>
        <Section title="Taxas da Rede">
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:16}}>
            {rateMeta.map(rm=>(
              <Card key={rm.id} style={{background:B.midGreen,textAlign:'center'}}>
                <GaugeSVG value={Math.min(nets[rm.id],1)} label={rm.label}/>
                <p style={{fontFamily:'Montserrat',fontSize:10,color:'rgba(252,252,235,.4)',marginTop:6}}>{rm.desc}</p>
              </Card>
            ))}
          </div>
        </Section>
        <Section title="Comparativo por Localidade">
          <div style={{borderRadius:12,border:'1px solid rgba(7,135,128,.2)',overflow:'hidden'}}>
            <div style={{overflowX:'auto'}}>
              <table style={{borderCollapse:'collapse',width:'100%',fontFamily:'Montserrat',minWidth:600}}>
                <thead><tr style={{background:B.deepGreen}}>
                  <th style={{padding:'10px 16px',textAlign:'left',fontSize:11,color:'rgba(252,252,235,.5)',textTransform:'uppercase',letterSpacing:'.08em'}}>Localidade</th>
                  {rateMeta.map(rm=><th key={rm.id} style={{padding:'10px 14px',textAlign:'center',fontSize:11,color:'rgba(252,252,235,.5)',textTransform:'uppercase',letterSpacing:'.06em'}}>{rm.label}</th>)}
                </tr></thead>
                <tbody>
                  {data.map((loc,i)=>(
                    <tr key={loc.id} style={{background:i%2===0?'transparent':'rgba(12,81,73,.2)'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(7,135,128,.08)'} onMouseLeave={e=>e.currentTarget.style.background=i%2===0?'transparent':'rgba(12,81,73,.2)'}>
                      <td style={{padding:'9px 16px',color:B.cream,fontSize:13,fontWeight:500}}>{loc.flag} {loc.name}</td>
                      {rateMeta.map(rm=>{
                        const val=loc[rm.id]||0;
                        const all=data.map(d=>d[rm.id]||0);
                        const c=statusColor2(val,all);
                        return <td key={rm.id} style={{padding:'9px 14px',textAlign:'center'}}>
                          <span style={{display:'inline-flex',alignItems:'center',gap:4,fontFamily:'Montserrat',fontSize:12,fontWeight:600,color:c}}>
                            <span style={{width:6,height:6,borderRadius:'50%',background:c,display:'inline-block'}}/>
                            {`${(val*100).toFixed(1)}%`}
                          </span>
                        </td>;
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </Section>
      </div>
    </div>
  );
}

            <HeroShapes opacity={.1}/>
            <div style={{position:'relative',zIndex:1}}>
              <p style={{fontFamily:'Montserrat',fontSize:11,textTransform:'uppercase',letterSpacing:'.1em',color:'rgba(252,252,235,.55)',marginBottom:8}}>Maior crescimento · {sem}</p>
              <div style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
                <span style={{fontSize:36}}>{leader.flag}</span>
                <div>
                  <h2 style={{fontFamily:'"Brygada 1918",serif',fontSize:34,fontWeight:700,color:B.cream,margin:0}}>{leader.name}</h2>
                  <TierBadge tier={leader.tier}/>
                </div>
                <div style={{marginLeft:'auto'}}>
                  <p style={{fontFamily:'"Brygada 1918",serif',fontSize:46,fontWeight:700,color:B.cream,margin:0,lineHeight:1}}>+{leader.gr.toFixed(1)}%</p>
                  <p style={{fontFamily:'Montserrat',fontSize:12,color:'rgba(252,252,235,.5)',margin:0}}>crescimento SoS</p>
                </div>
              </div>
            </div>
          </div>
        )}

        <Section title="Crescimento SoS por Localidade">
          <Card style={{background:B.deepGreen}}>
            <BarChartZ data={chartData} horizontal showDelta/>
          </Card>
        </Section>

        <Section title={null}>
          <div style={{borderRadius:12,border:'1px solid rgba(7,135,128,.2)',overflow:'hidden'}}>
            <table style={{borderCollapse:'collapse',width:'100%',fontFamily:'Montserrat'}}>
              <thead><tr style={{background:B.deepGreen}}>
                <th style={{padding:'10px 16px',textAlign:'left',fontSize:11,color:'rgba(252,252,235,.5)',textTransform:'uppercase',letterSpacing:'.08em',width:50}}>#</th>
                <th style={{padding:'10px 12px',textAlign:'left',fontSize:11,color:'rgba(252,252,235,.5)',textTransform:'uppercase',letterSpacing:'.08em'}}>Localidade</th>
                <th style={{padding:'10px 12px',textAlign:'right',fontSize:11,color:'rgba(252,252,235,.5)',textTransform:'uppercase',letterSpacing:'.08em'}}>Atual</th>
                <th style={{padding:'10px 12px',textAlign:'right',fontSize:11,color:'rgba(252,252,235,.5)',textTransform:'uppercase',letterSpacing:'.08em'}}>Anterior</th>
                <th style={{padding:'10px 12px',textAlign:'right',fontSize:11,color:'rgba(252,252,235,.5)',textTransform:'uppercase',letterSpacing:'.08em'}}>Crescimento</th>
              </tr></thead>
              <tbody>
                {rows.map((r,i)=>(
                  <tr key={r.id} style={{background:i%2===0?'transparent':'rgba(12,81,73,.2)',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(7,135,128,.08)'} onMouseLeave={e=>e.currentTarget.style.background=i%2===0?'transparent':'rgba(12,81,73,.2)'}>
                    <td style={{padding:'10px 16px',color:i<3?B.ice:'rgba(252,252,235,.3)',fontSize:14,fontWeight:700,fontFamily:'"Brygada 1918",serif'}}>{i+1}</td>
                    <td style={{padding:'10px 12px',color:B.cream,fontSize:13,fontWeight:500}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>{r.flag} {r.name} <TierBadge tier={r.tier} small/></div>
                    </td>
                    <td style={{padding:'10px 12px',textAlign:'right',color:'rgba(252,252,235,.7)',fontSize:12}}>{fmtNum(r.curr)}</td>
                    <td style={{padding:'10px 12px',textAlign:'right',color:'rgba(252,252,235,.4)',fontSize:12}}>{fmtNum(r.prev)}</td>
                    <td style={{padding:'10px 12px',textAlign:'right',fontSize:13,fontWeight:600,color:r.gr>=0?B.sage:B.red}}>{r.gr>=0?'↑':'↓'} {Math.abs(r.gr).toFixed(1)}%</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Section>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState('global');
  const [locExpanded,setLocExpanded]=useState(true);
  const [sem,setSem]=useState('2026-S1');
  const [locF,setLocF]=useState('all');

  const PAGE_TITLES={global:'Rede Global',heatmap:'Mapa de Calor',rates:'Taxas Estratégicas',ranking:'Ranking de Crescimento'};
  const getTitle=()=>{
    if(PAGE_TITLES[page]) return PAGE_TITLES[page];
    if(page.startsWith('metric-')) return METRICS.find(m=>m.id===page.replace('metric-',''))?.label||'Métrica';
    if(page.startsWith('loc-')) return LOCATIONS.find(l=>l.id===page.replace('loc-',''))?.name||'Localidade';
    return 'Dashboard';
  };

  const renderPage=()=>{
    if(page==='global') return <PageGlobal sem={sem}/>;
    if(page==='heatmap') return <PageHeatmap/>;
    if(page==='rates') return <PageRates sem={sem}/>;
    if(page==='ranking') return <PageRanking sem={sem}/>;
    if(page.startsWith('metric-')) return <PageMetric metricId={page.replace('metric-','')} sem={sem}/>;
    if(page.startsWith('loc-')) return <PageLocation locId={page.replace('loc-','')} sem={sem} setPage={setPage}/>;
    return <PageGlobal sem={sem}/>;
  };

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:B.black}}>
      <Sidebar page={page} setPage={setPage} locExpanded={locExpanded} setLocExpanded={setLocExpanded}/>
      <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
        <Header title={getTitle()} sem={sem} setSem={setSem} locF={locF} setLocF={setLocF}/>
        <main style={{flex:1,overflowY:'auto',background:B.black}}>
          {renderPage()}
        </main>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
