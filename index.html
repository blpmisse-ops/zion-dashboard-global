/* PÚBLICO: SILVER≤300 | GOLD 301-2000 | PLATINUM 2001-3000 | DIAMOND 3001-4000 | BLACK>4000 */
function getTier(v){
  if(v<=0)    return TIER_DEF[5];
  if(v<=300)  return TIER_DEF[4];
  if(v<=2000) return TIER_DEF[3];
  if(v<=3000) return TIER_DEF[2];
  if(v<=4000) return TIER_DEF[1];
  return TIER_DEF[0];
}
/* PRÉDIO — tier é fixo por church (campo `tier` em PRED_DATA), não calculado por fórmula */

function getBldgTierByName(name){return BLDG_TIER.find(t=>t.name===name)||BLDG_TIER[6];}
function getBldgTier(seats){
  if(seats<=0)    return BLDG_TIER[6];
  if(seats<=300)  return BLDG_TIER[4];
  if(seats<=500)  return BLDG_TIER[3];
  if(seats<=750)  return BLDG_TIER[2];
  if(seats<=1000) return BLDG_TIER[1];
  return BLDG_TIER[0];
}

/* ═══ CALC */
function lastVal(locId,months,field){
  const av=months.filter(m=>DATA[locId]?.[m]?.[field]!==undefined);
  return av.length?DATA[locId][av[av.length-1]][field]||0:0;
}
function maxVal(locId,months,field){
  const vals=months.map(m=>DATA[locId]?.[m]?.[field]||0).filter(v=>v>0);
  return vals.length?Math.max(...vals):0;
}
function sumFlow(locId,months,field){
  return months.reduce((s,m)=>s+(DATA[locId]?.[m]?.[field]||0),0);
}
function avgSunday(locId,months){
  let t=0,c=0;
  months.forEach(m=>{
    const d=DATA[locId]?.[m];
    if(d?.sunS&&d?.sunN){t+=d.sunS;c+=d.sunN;}
  });
  return c>0?Math.round(t/c):0;
}
function monthAvgSun(locId,ym){
  const d=DATA[locId]?.[ym];
  if(!d?.sunS||!d?.sunN) return 0;
  return Math.round(d.sunS/d.sunN);
}
function globalForPeriod(period){
  const months=pMonths(period);
  let tSun=0,cSun=0,bap=0,raiz=0,links=0,plinks=0,vol=0,zao=0,ig=0,yt=0;
  LOCS.forEach(loc=>{
    months.forEach(m=>{
      const d=DATA[loc.id]?.[m];if(d?.sunS&&d?.sunN){tSun+=d.sunS;cSun+=d.sunN;}
      bap+=DATA[loc.id]?.[m]?.bap||0;
      raiz+=DATA[loc.id]?.[m]?.raiz||0;
    });
    links+=lastVal(loc.id,months,'links');
    plinks+=lastVal(loc.id,months,'plinks');
    vol+=maxVal(loc.id,months,'vol');
    zao+=maxVal(loc.id,months,'zao');
    ig+=lastVal(loc.id,months,'ig');
    yt+=lastVal(loc.id,months,'yt');
  });
  const avgSun=cSun>0?Math.round(tSun/cSun):0;
  return{avgSun,bap,raiz,links,plinks,vol,zao,ig,yt,pessoasPerLink:links>0?Math.round(plinks/links*10)/10:0};
}
function delta(cur,prv){
  if(!prv||prv===0)return null;
  return Math.round((cur-prv)/prv*1000)/10;
}

/* ═══ FORMAT — no rounding of integers */
function fmt(n){
  if(n===null||n===undefined)return'—';
  if(typeof n==='number'&&!Number.isInteger(n))return n.toFixed(1);
  return Math.round(n).toLocaleString('pt-BR');
}
function fmtPct(n){return n===null?'':(n>0?'+':'')+n.toFixed(1)+'%';}
function fmtMonth(ym){
  const MNAMES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const [y,m]=ym.split('-');
  return MNAMES[parseInt(m)-1]+'/'+y.slice(2);
}

/* ═══ PRIMITIVES */
function Card({children,style={}}){
  return<div style={{background:'rgba(7,135,128,0.08)',border:'1px solid rgba(7,135,128,0.2)',borderRadius:12,padding:'16px 20px',...style}}>{children}</div>;
}
function KpiCard({label,value,d,unit=''}){
  const pos=d===null?null:d>=0;
  return(
    <Card style={{textAlign:'center'}}>
      <div style={{fontSize:10,color:C.teal,textTransform:'uppercase',letterSpacing:1,marginBottom:5}}>{label}</div>
      <div className="serif" style={{fontSize:24,fontWeight:700,color:C.cream,lineHeight:1.1}}>{fmt(value)}{unit&&<span style={{fontSize:12}}> {unit}</span>}</div>
      {d!==null&&<div style={{fontSize:11,marginTop:3,color:pos?C.sage:'#e05c5c'}}>{fmtPct(d)} vs período ant.</div>}
    </Card>
  );
}
function DeltaBadge({d}){
  if(d===null)return<span style={{color:'#555'}}>—</span>;
  return<span style={{color:d>=0?C.sage:'#e05c5c',fontSize:11,fontWeight:600}}>{fmtPct(d)}</span>;
}
const TTS={background:'#021a1a',border:'1px solid #078780',borderRadius:8,color:'#FCFCEB',fontSize:12,zIndex:100};
function TT({active,payload,label}){
  if(!active||!payload?.length)return null;
  return(
    <div style={TTS}>
      <div style={{padding:'5px 10px',borderBottom:'1px solid #078780',color:C.teal,fontWeight:600}}>{label}</div>
      {payload.map((p,i)=>(
        <div key={i} style={{padding:'3px 10px'}}>
          <span style={{color:p.color,marginRight:6}}>●</span>
          {p.name}: <strong>{typeof p.value==='number'?p.value.toLocaleString('pt-BR'):p.value}</strong>
        </div>
      ))}
    </div>
  );
}
function ChartTitle({children}){
  return<h4 style={{fontSize:15,color:C.teal,marginBottom:10,fontWeight:600}}>{children}</h4>;
}

/* ═══ PERIOD SELECTOR */
function PeriodSelector({value,onChange}){
  const isYear= value.length===4;
  const isQ   = value.includes('-Q');
  const isS   = value.includes('-S');
  const year  = isYear?value:value.split(/[-Q]|-S/)[0];
  const q     = isQ?value.split('-Q')[1]:null;
  const sem   = isS?value.split('-S')[1]:null;
  const btnStyle=(active)=>({
    padding:'4px 10px',borderRadius:20,border:'none',cursor:'pointer',fontSize:11,fontWeight:600,
    background:active?C.teal:'rgba(7,135,128,0.15)',color:active?C.cream:C.teal,
  });
  const hasQ2 = year!=='2026';
  return(
    <div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'flex-end'}}>
      <div style={{display:'flex',gap:4}}>
        {YEARS.map(y=>(
          <button key={y} onClick={()=>onChange(y)} style={btnStyle(year===y)}>{y}</button>
        ))}
      </div>
      <div style={{display:'flex',gap:4,flexWrap:'wrap',justifyContent:'flex-end'}}>
        <button onClick={()=>onChange(year)} style={btnStyle(isYear)}>Ano</button>
        <button onClick={()=>onChange(year+'-S1')} style={btnStyle(sem==='1')}>S1</button>
        {hasQ2&&<button onClick={()=>onChange(year+'-S2')} style={btnStyle(sem==='2')}>S2</button>}
        <span style={{borderLeft:'1px solid rgba(7,135,128,0.3)',margin:'0 2px'}}/>
        <button onClick={()=>onChange(year+'-Q1')} style={btnStyle(q==='1')}>T1</button>
        <button onClick={()=>onChange(year+'-Q2')} style={btnStyle(q==='2')}>T2</button>
        {hasQ2&&<button onClick={()=>onChange(year+'-Q3')} style={btnStyle(q==='3')}>T3</button>}
        {hasQ2&&<button onClick={()=>onChange(year+'-Q4')} style={btnStyle(q==='4')}>T4</button>}
      </div>
    </div>
  );
}

/* ═══ HEATMAP — normalized per ROW, sorted alphabetically */
function HeatmapTable({locRows,months,getMonthVal,getSemVal}){
  const sorted=[...locRows].sort((a,b)=>a.loc.name.localeCompare(b.loc.name));
  return(
    <div style={{overflowX:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
        <thead>
          <tr>
            <th style={{textAlign:'left',padding:'7px 8px',color:C.teal,borderBottom:'1px solid #078780',whiteSpace:'nowrap'}}>Localidade</th>
            {months.map(m=>(
              <th key={m} style={{textAlign:'center',padding:'7px 8px',color:C.teal,borderBottom:'1px solid #078780',minWidth:64}}>{fmtMonth(m)}</th>
            ))}
            <th style={{textAlign:'center',padding:'7px 8px',color:C.teal,borderBottom:'1px solid #078780'}}>Total/Média</th>
          </tr>
        </thead>
        <tbody>
          {sorted.map(({loc})=>{
            const rowVals=months.map(m=>getMonthVal(loc.id,m));
            const rMin=Math.min(...rowVals);
            const rMax=Math.max(...rowVals,rMin+1);
            return(
              <tr key={loc.id}>
                <td style={{padding:'5px 8px',color:C.cream,fontWeight:500,borderBottom:'1px solid rgba(7,135,128,0.08)',whiteSpace:'nowrap'}}>{loc.flag} {loc.name}</td>
                {rowVals.map((v,mi)=>{
                  const t=rMax>rMin?(v-rMin)/(rMax-rMin):0.5;
                  const r=Math.round(4+(7-4)*t);
                  const g=Math.round(48+(135-48)*t);
                  const b=Math.round(48+(128-48)*t);
                  return(
                    <td key={mi} style={{background:`rgb(${r},${g},${b})`,color:t>0.55?'#021a1a':C.cream,textAlign:'center',padding:'5px 6px',fontWeight:600,border:'1px solid #021a1a',minWidth:64,fontSize:11}}>
                      {fmt(v)}
                    </td>
                  );
                })}
                <td style={{textAlign:'center',padding:'5px 8px',fontWeight:700,color:C.teal,borderBottom:'1px solid rgba(7,135,128,0.08)'}}>{fmt(getSemVal(loc.id))}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function LocMultiFilter({selected,onChange}){
  const [open,setOpen]=useState(false);
  const allSel=selected.length===LOCS.length;
  function toggle(id){
    if(selected.includes(id)){
      const nx=selected.filter(x=>x!==id);
      if(nx.length>0)onChange(nx);
    } else onChange([...selected,id]);
  }
  const nSel=selected.length;
  const labelText=allSel?'Todas as igrejas (19)':nSel===0?'Nenhuma':
    nSel<=3?LOCS.filter(l=>selected.includes(l.id)).map(l=>l.name).join(', '):
    nSel+' igrejas selecionadas';
  const btnBorder=open?'1px solid '+C.teal:'1px solid rgba(7,135,128,0.3)';

    <div style={{position:'relative',display:'inline-block'}}>
      <button onClick={()=>setOpen(function(o){return !o;})} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 14px',borderRadius:8,border:btnBorder,background:'rgba(7,135,128,0.08)',color:C.cream,cursor:'pointer',fontSize:12,fontWeight:600,minWidth:220,justifyContent:'space-between'}}>

            <button onClick={()=>onChange(LOCS.filter(l=>l.id!=='São Paulo').map(l=>l.id))} style={{flex:1,padding:'3px 0',borderRadius:6,border:'none',cursor:'pointer',fontSize:10,fontWeight:600,background:'rgba(7,135,128,0.15)',color:C.teal}}>Sem SP</button>
          </div>

/* ═══ PAGE: VISÃO GLOBAL */
function PageGlobal(){
  const [period,setPeriod]=useState('2026-S1');
  const [selLocs,setSelLocs]=useState(LOCS.map(l=>l.id));
  const filtLocs=LOCS.filter(l=>selLocs.includes(l.id));
  const months=pMonths(period);
  const prev=prevPeriod(period);

  function filtGlobal(ms){
    let s=0,n=0,bap=0,raiz=0,links=0,plinks=0,vol=0,zao=0;
    filtLocs.forEach(loc=>{
      const ms2=ms||[];
      let ls=0,ln=0;
      ms2.forEach(m=>{const d=DATA[loc.id]?.[m];if(d&&d.sunN>0){ls+=d.sunS;ln+=d.sunN;}});
      s+=ls;n+=ln;
      bap+=sumFlow(loc.id,ms2,'bap');
      raiz+=sumFlow(loc.id,ms2,'raiz');
      links+=lastVal(loc.id,ms2,'links');
      plinks+=lastVal(loc.id,ms2,'plinks');
      vol+=maxVal(loc.id,ms2,'vol');
      zao+=maxVal(loc.id,ms2,'zao');
    });
    const avgSun=n>0?Math.round(s/n):0;
    return{avgSun,bap,raiz,links,plinks,vol,zao,pessoasPerLink:links>0?+(plinks/links).toFixed(1):0};
  }
  const cur=filtGlobal(months);
  const prv=prev?filtGlobal(pMonths(prev)):null;

  const kpis=[
    {label:'Média de Pessoas por Domingo',value:cur.avgSun,  d:prv?delta(cur.avgSun,prv.avgSun):null},
    {label:'Total de Batismos',            value:cur.bap,     d:prv?delta(cur.bap,prv.bap):null},
    {label:'Total de Raízes',              value:cur.raiz,    d:prv?delta(cur.raiz,prv.raiz):null},
    {label:'Links Ativos',                 value:cur.links,   d:prv?delta(cur.links,prv.links):null},
    {label:'Pessoas em Links',             value:cur.plinks,  d:prv?delta(cur.plinks,prv.plinks):null},
    {label:'Voluntários Ativos',           value:cur.vol,     d:prv?delta(cur.vol,prv.vol):null},
    {label:'Matrículas ZAO',               value:cur.zao,     d:prv?delta(cur.zao,prv.zao):null},
    {label:'Média Pessoas por Link',       value:cur.pessoasPerLink,d:prv?delta(cur.pessoasPerLink,prv.pessoasPerLink):null},
  ];

  const allLocSun=filtLocs.map(loc=>({name:loc.name,flag:loc.flag,val:avgSunday(loc.id,months)})).sort((a,b)=>b.val-a.val);
  const allLocBap=filtLocs.map(loc=>({name:loc.name,val:sumFlow(loc.id,months,'bap')})).sort((a,b)=>b.val-a.val);
  const allLocLinks=filtLocs.map(loc=>({name:loc.name,val:lastVal(loc.id,months,'links')})).sort((a,b)=>b.val-a.val);
  const allLocPlinks=filtLocs.map(loc=>({name:loc.name,val:lastVal(loc.id,months,'plinks')})).sort((a,b)=>b.val-a.val);
  const allLocVol=filtLocs.map(loc=>({name:loc.name,val:lastVal(loc.id,months,'vol')})).sort((a,b)=>b.val-a.val);

  const allPeriods=['2024-S1','2024-S2','2025-S1','2025-S2','2026-S1'];
  const trendData=allPeriods.map(p=>{const g=filtGlobal(pMonths(p));return{name:PERIODS[p].label,...g};});

  function AllLocBar({data,dataKey,label,color}){
    return(
      <Card>
        <ChartTitle>{label} — {selLocs.length===LOCS.length?'Todas as Localidades':`${selLocs.length} Localidades Selecionadas`}</ChartTitle>
        <ResponsiveContainer width="100%" height={360}>
          <BarChart data={data} margin={{top:22,right:8,bottom:50,left:55}}>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(7,135,128,0.12)"/>
            <XAxis dataKey="name" tick={{fill:C.cream,fontSize:11}} angle={-40} textAnchor="end" interval={0} axisLine={false} tickLine={false} height={60}/>
            <YAxis domain={[0,'auto']} tick={{fill:C.teal,fontSize:11}} axisLine={false} tickLine={false} tickFormatter={v=>v.toLocaleString('pt-BR')} width={55}/>
            <Tooltip content={<TT/>}/>
            <Bar isAnimationActive={false} dataKey={dataKey} name={label} fill={color||C.teal} radius={[3,3,0,0]} isAnimationActive={false}>
              {data.map((_,i)=><Cell key={i} fill={i===0?C.sage:color||C.teal}/>)}
              <LabelList dataKey={dataKey} position="top" style={{fill:C.cream,fontSize:11}} formatter={v=>v.toLocaleString('pt-BR')}/>
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </Card>
    );
  }

  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
        <h2 className="serif" style={{fontSize:22,color:C.cream}}>Visão Global — {PERIODS[period]?.label}</h2>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <LocMultiFilter selected={selLocs} onChange={setSelLocs}/>
          <PeriodSelector value={period} onChange={setPeriod}/>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(148px,1fr))',gap:12}}>
        {kpis.map(k=><KpiCard key={k.label} {...k}/>)}
      </div>

      {/* All-location charts */}
      <AllLocBar data={allLocSun} dataKey="val" label="Média de Pessoas por Domingo" color={C.teal}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <AllLocBar data={allLocBap} dataKey="val" label="Total de Batismos" color={C.teal}/>
        <AllLocBar data={allLocLinks} dataKey="val" label="Links Ativos" color={C.sage}/>
        <AllLocBar data={allLocPlinks} dataKey="val" label="Pessoas em Links" color={C.teal}/>
        <AllLocBar data={allLocVol} dataKey="val" label="Voluntários Ativos" color={C.sage}/>
      </div>

      {/* Semestral trend */}
      <Card>
        <ChartTitle>Evolução Semestral Global — Média de Pessoas por Domingo</ChartTitle>
        <ResponsiveContainer width="100%" height={320}>
          <AreaChart data={trendData} margin={{top:20,right:10,bottom:0,left:0}}>
            <defs><linearGradient id="ga" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.teal} stopOpacity={0.35}/><stop offset="95%" stopColor={C.teal} stopOpacity={0}/></linearGradient></defs>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(7,135,128,0.15)"/>
            <XAxis dataKey="name" tick={{fill:C.teal,fontSize:11}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fill:C.teal,fontSize:11}} axisLine={false} tickLine={false} tickFormatter={v=>v.toLocaleString('pt-BR')}/>
            <Tooltip content={<TT/>}/>
            <Area isAnimationActive={false} type="monotone" dataKey="avgSun" name="Média de Pessoas por Domingo" stroke={C.teal} fill="url(#ga)" strokeWidth={2} dot={{r:3,fill:C.teal}}>
              <LabelList dataKey="avgSun" position="top" style={{fill:C.cream,fontSize:11}} formatter={v=>v.toLocaleString('pt-BR')}/>
            </Area>
          </AreaChart>
        </ResponsiveContainer>
      </Card>
    </div>
  );
}

/* ═══ PAGE: CULTOS */
function PageCultos(){
  const [period,setPeriod]=useState('2026-S1');
  const [selLocs,setSelLocs]=useState(LOCS.map(l=>l.id));
  const filtLocs=LOCS.filter(l=>selLocs.includes(l.id));
  const months=pMonths(period);
  const prev=prevPeriod(period);
  const prevM=prev?pMonths(prev):[];

  const locRows=filtLocs.map(loc=>{
    const cur=avgSunday(loc.id,months);
    const prv=prev?avgSunday(loc.id,prevM):null;
    return{loc,cur,prv,d:prv!==null?delta(cur,prv):null};
  }).sort((a,b)=>b.cur-a.cur);

  let gSum=0; filtLocs.forEach(l=>{gSum+=avgSunday(l.id,months);});
  const gAvg=filtLocs.length>0?Math.round(gSum/filtLocs.length):0;
  let gPSum=0; if(prev)filtLocs.forEach(l=>{gPSum+=avgSunday(l.id,prevM);});
  const gPAvg=(prev&&filtLocs.length>0)?Math.round(gPSum/filtLocs.length):null;

  // All periods trend
  const allPeriods=['2024-S1','2024-S2','2025-S1','2025-S2','2026-S1'];
  const trendData=allPeriods.filter(p=>PERIODS[p]).map(p=>{
    let t=0; filtLocs.forEach(l=>{t+=avgSunday(l.id,pMonths(p));});
    return{name:PERIODS[p].label,val:filtLocs.length>0?Math.round(t/filtLocs.length):0};
  });

  // Monthly global attendance
  const weeklyData=months.filter(m=>filtLocs.some(l=>DATA[l.id]?.[m]?.sunS)).map(m=>{
    let tot=0;
    filtLocs.forEach(l=>{const d=DATA[l.id]?.[m];if(d?.sunS&&d?.sunN)tot+=Math.round(d.sunS/d.sunN);});
    return{name:fmtMonth(m),total:tot};
  });

  // Annual comparison
  const annualComp=filtLocs.map(loc=>({
    name:loc.name,
    y24:avgSunday(loc.id,pMonths('2025-S1')),
    y25:avgSunday(loc.id,pMonths('2026-S1')),

        {locRows.slice(0,3).map(r=><KpiCard key={r.loc.id} label={r.loc.name} value={r.cur} d={r.d}/>)}

              <defs><linearGradient id="gcu" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.teal} stopOpacity={0.35}/><stop offset="95%" stopColor={C.teal} stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(7,135,128,0.15)"/>
              <XAxis dataKey="name" tick={{fill:C.teal,fontSize:11}} axisLine={false} tickLine={false}/>

function MetricPage({title,pageTitle,field,isStock,aggFn,description,color,compTitle}){
  color=color||C.teal;
  const [period,setPeriod]=useState('2026-S1');
  const [locFilter,setLocFilter]=useState('global');
  const [selLocs,setSelLocs]=useState(LOCS.map(l=>l.id));
  const filtLocs=LOCS.filter(l=>selLocs.includes(l.id));
  const months=pMonths(period);
  const prev=prevPeriod(period);
  const prevM=prev?pMonths(prev):[];

  const isGlobal=locFilter==='global';
  let gCur=0,gPrv=0;
  if(isGlobal){
    filtLocs.forEach(l=>{gCur+=aggFn(l.id,months,field);if(prev)gPrv+=aggFn(l.id,prevM,field);});
  } else {
    gCur=aggFn(locFilter,months,field);
    if(prev)gPrv=aggFn(locFilter,prevM,field);
  }
  const gD=prev?delta(gCur,gPrv):null;

  const locRows=filtLocs.map(loc=>{
    const cur=aggFn(loc.id,months,field);
    const prv=prev?aggFn(loc.id,prevM,field):null;
    return{loc,cur,prv,d:prv!==null?delta(cur,prv):null};
  }).sort((a,b)=>b.cur-a.cur);

  const allPeriods=['2024-S1','2024-S2','2025-S1','2025-S2','2026-S1'];

/* ═══ PAGE: TAXAS */
function PageTaxas(){
  const [period,setPeriod]=useState('2026-S1');
  const [selLocs,setSelLocs]=useState(LOCS.map(l=>l.id));
  const months=pMonths(period);
  const prev=prevPeriod(period);
  const prevM=prev?pMonths(prev):[];
  const filtLocs=LOCS.filter(l=>selLocs.includes(l.id));

  function rates(locId,ms){
    const sun=avgSunday(locId,ms);
    const pl=lastVal(locId,ms,'plinks');
    const vol=lastVal(locId,ms,'vol');
    const links=lastVal(locId,ms,'links');
    const zao=maxVal(locId,ms,'zao');
    const bap=sumFlow(locId,ms,'bap');
    /* Taxas */
    const conexao  =sun>0?+(pl/sun*100).toFixed(1):0;          // % em links
    const servico  =sun>0?+(vol/sun*100).toFixed(1):0;         // % servindo
    const densidade=links>0?+(pl/links).toFixed(1):0;          // pessoas por link
    const zaoRate  =sun>0?+(zao/sun*100).toFixed(1):0;         // % estudando no ZAO
    const engajamento=sun>0?+((pl+vol)/sun*100).toFixed(1):0;  // % engajados (link OU servindo)
    const batPer1k =sun>0?+(bap/(ms.length||1)/sun*1000).toFixed(1):0; // batismos por 1000 por mês
    return{conexao,servico,densidade,zaoRate,engajamento,batPer1k,sun,pl,vol,links,zao,bap};
  }

  const locData=filtLocs.map(loc=>({loc,cur:rates(loc.id,months),prv:prev?rates(loc.id,prevM):null}));

  /* Sort data for charts */
  const conexData =[...locData].sort((a,b)=>b.cur.conexao -a.cur.conexao ).map(({loc,cur})=>({name:loc.name,val:cur.conexao}));
  const densData  =[...locData].sort((a,b)=>b.cur.densidade-a.cur.densidade).map(({loc,cur})=>({name:loc.name,val:cur.densidade}));
  const engData   =[...locData].sort((a,b)=>b.cur.engajamento-a.cur.engajamento).map(({loc,cur})=>({name:loc.name,val:cur.engajamento}));
  const servicData=[...locData].sort((a,b)=>b.cur.servico-a.cur.servico).map(({loc,cur})=>({name:loc.name,val:cur.servico}));
  const zaoData   =[...locData].sort((a,b)=>b.cur.zaoRate-a.cur.zaoRate).map(({loc,cur})=>({name:loc.name,val:cur.zaoRate}));

  /* Global averages */
  function globalAvg(key){
    const vals=locData.map(d=>d.cur[key]).filter(v=>v>0);
    return vals.length>0?+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):0;
  }

  const RATE_COLS=[
    {key:'conexao',    label:'Conexão (Links %)',      fmt:v=>v.toFixed(1)+'%', good:v=>v>=30},
    {key:'servico',    label:'Serviço (Vol %)',         fmt:v=>v.toFixed(1)+'%', good:v=>v>=15},
    {key:'engajamento',label:'Engajamento (Links+Vol)',fmt:v=>v.toFixed(1)+'%', good:v=>v>=40},
    {key:'densidade',  label:'Densidade (Pess/Link)',  fmt:v=>v.toFixed(1),     good:v=>v>=8},
    {key:'zaoRate',    label:'ZAO (% Estudo)',          fmt:v=>v.toFixed(1)+'%', good:v=>v>=5},
    {key:'batPer1k',   label:'Batismo /1k/mês',        fmt:v=>v.toFixed(1),     good:v=>v>=5},
  ];

  function RateBar({data,label,color,fmt}){
    return(
      <Card>
        <ChartTitle>{label}</ChartTitle>
        <ResponsiveContainer width="100%" height={300}>
          <BarChart data={data} margin={{top:20,right:8,bottom:45,left:0}}>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(7,135,128,0.12)"/>
            <XAxis dataKey="name" tick={{fill:C.cream,fontSize:10}} angle={-35} textAnchor="end" interval={0} axisLine={false} tickLine={false} height={55}/>
            <YAxis tick={{fill:C.teal,fontSize:11}} axisLine={false} tickLine={false}/>
            <Tooltip content={<TT/>}/>
            <Bar isAnimationActive={false} dataKey="val" name={label} fill={color||C.teal} radius={[4,4,0,0]}>
              {data.map((_,i)=><Cell key={i} fill={i===0?C.sage:color||C.teal}/>)}
              <LabelList dataKey="val" position="top" style={{fill:C.cream,fontSize:10}} formatter={fmt||((v)=>v.toFixed(1))}/>
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </Card>
    );
  }

  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
        <div>
          <h2 className="serif" style={{fontSize:22,color:C.cream}}>Taxas Estratégicas</h2>
          <p style={{fontSize:12,color:C.teal,marginTop:2}}>Indicadores de eficiência ministerial — relação entre as métricas de cada localidade</p>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <LocMultiFilter selected={selLocs} onChange={setSelLocs}/>
          <PeriodSelector value={period} onChange={setPeriod}/>
        </div>
      </div>

      {/* KPI summary */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:12}}>
        {RATE_COLS.map(r=>(
          <Card key={r.key} style={{textAlign:'center'}}>
            <div style={{fontSize:10,color:C.teal,textTransform:'uppercase',letterSpacing:1,marginBottom:5,whiteSpace:'pre-line',lineHeight:1.3}}>{r.label}</div>
            <div className="serif" style={{fontSize:22,fontWeight:700,color:C.cream}}>{r.fmt(globalAvg(r.key))}</div>
            <div style={{fontSize:10,color:'#666',marginTop:2}}>média rede</div>
          </Card>

      {/* Definitions */}
      <div style={{background:'rgba(7,135,128,0.06)',border:'1px solid rgba(7,135,128,0.2)',borderRadius:10,padding:'12px 16px',fontSize:11,color:'#aaa',lineHeight:1.7}}>
        <span style={{color:C.teal,fontWeight:700}}>Guia de leitura: </span>
        <b style={{color:C.cream}}>Conexão</b> = Pessoas em Links ÷ Presença/Dom (%) &nbsp;|&nbsp;
        <b style={{color:C.cream}}>Serviço</b> = Voluntários ÷ Presença/Dom (%) &nbsp;|&nbsp;
        <b style={{color:C.cream}}>Engajamento</b> = (Links + Vol) ÷ Presença/Dom — % do púlpito engajado &nbsp;|&nbsp;
        <b style={{color:C.cream}}>Densidade</b> = Pessoas ÷ Nº Links — qualidade dos links &nbsp;|&nbsp;
        <b style={{color:C.cream}}>ZAO</b> = Matrículas ZAO ÷ Presença/Dom (%) &nbsp;|&nbsp;
        <b style={{color:C.cream}}>Batismo/1k</b> = Batismos ÷ Presença × 1000 por mês

      {/* Chart grid */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <RateBar data={conexData}  label="Taxa de Conexão — % do Público em Links"           color={C.teal}  fmt={v=>v.toFixed(1)+'%'}/>
        <RateBar data={engData}    label="Taxa de Engajamento — % em Links OU Servindo"       color='#5b9bd5' fmt={v=>v.toFixed(1)+'%'}/>
        <RateBar data={servicData} label="Taxa de Serviço — % do Público como Voluntários"    color={C.sage}  fmt={v=>v.toFixed(1)+'%'}/>
        <RateBar data={densData}   label="Densidade de Links — Pessoas por Link Ativo"        color='#9b8fd5' fmt={v=>v.toFixed(1)}/>

      {/* Detailed table */}
      <Card>
        <ChartTitle>Tabela Completa de Taxas por Localidade</ChartTitle>

          <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>

            </tr></thead>
            <tbody>
              {locData.sort((a,b)=>b.cur.engajamento-a.cur.engajamento).map(({loc,cur,prv})=>(

/* ═══ PAGE: CONTROLE DE DADOS */
function expectedSundays(ym){
  const [y,m]=ym.split('-').map(Number);
  const d=new Date(y,m-1,1);
  let n=0;
  while(d.getMonth()===m-1){if(d.getDay()===0)n++;d.setDate(d.getDate()+1);}
  if(m===1) n=Math.max(0,n-1); /* primeira semana de janeiro = recesso */
  return n;
}
function PageDataControl(){
  const [period,setPeriod]=useState('2026-S1');
  const [locFilter,setLocFilter]=useState('all');
  const [monthFilter,setMonthFilter]=useState('all');
  const allMonths=pMonths(period);
  const months=monthFilter==='all'?allMonths:allMonths.filter(m=>m===monthFilter);
  const MNAMES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  function mn(ym){return MNAMES[parseInt(ym.split('-')[1])-1];}

  const METRIC_DEFS=[
    {key:'sun',   label:'Presença em Culto', isSun:true},
    {key:'links', label:'LINKs'},
    {key:'plinks',label:'Pessoas em Links'},
    {key:'raiz',  label:'Raízes'},
    {key:'bap',   label:'Batismo nas Águas'},
    {key:'vol',   label:'Voluntários'},
    {key:'zao',   label:'I.B.ZAO'},
    {key:'ig',    label:'Presença Digital'},
  ];

  function locStatus(locId){
    const metRows=METRIC_DEFS.map(m=>{
      if(m.isSun){
        const monthDetails=months.map(mo=>{
          const d=DATA[locId]?.[mo];
          const filled=d?.sunN||0;
          const expected=expectedSundays(mo);
          const missing=Math.max(0,expected-filled);
          return{mo,filled,expected,missing};
        });
        const totalFilled=monthDetails.reduce((s,r)=>s+r.filled,0);
        const totalExpected=monthDetails.reduce((s,r)=>s+r.expected,0);
        const ok=totalFilled>=totalExpected&&totalExpected>0;
        const partial=totalFilled>0&&!ok;
        const missingList=monthDetails.filter(r=>r.missing>0);
        const tooltip=ok?null:
          missingList.length===0?'Sem cultos esperados neste período':
          'Faltam: '+missingList.map(r=>`${mn(r.mo)} (${r.missing} culto${r.missing>1?'s':''})`).join(' • ');
        return{...m,monthDetails,totalFilled,totalExpected,ok,partial,
          status:ok?'ok':partial?'partial':'pending',
          label2:`${totalFilled}/${totalExpected} cultos`,tooltip};
      } else {
        const monthDetails=months.map(mo=>{
          const val=DATA[locId]?.[mo]?.[m.key]||0;
          return{mo,val,filled:val>0};
        });
        const filled=monthDetails.filter(r=>r.filled);
        const missing=monthDetails.filter(r=>!r.filled);
        const ok=missing.length===0&&filled.length>0;
        const partial=filled.length>0&&!ok;
        const totalVal=filled.reduce((s,r)=>s+r.val,0);
        const tooltip=ok?null:
          missing.length===months.length?'Pendente em todos os meses do período':
          'Faltando em: '+missing.map(r=>mn(r.mo)).join(', ');
        return{...m,monthDetails,ok,partial,
          status:ok?'ok':partial?'partial':'pending',
          label2:(ok||partial)&&totalVal>0?totalVal.toLocaleString('pt-BR'):null,
          tooltip,missingMonths:missing};
      }
    });
    const okCount=metRows.filter(r=>r.ok).length;
    const partialCount=metRows.filter(r=>r.partial).length;
    return{metRows,okCount,partialCount,total:METRIC_DEFS.length};
  }

  const locData=LOCS.map(loc=>({loc,...locStatus(loc.id)}));
  const filtered=locFilter==='all'?locData:locData.filter(r=>r.loc.id===locFilter);
  const totalOk=locData.filter(r=>r.okCount===r.total).length;
  const totalPartial=locData.filter(r=>(r.okCount>0&&r.okCount<r.total)||r.partialCount>0).length;
  const totalNone=locData.filter(r=>r.okCount===0&&r.partialCount===0).length;

  function Badge({status,label2,tooltip}){
    const cfg={
      ok:     {bg:'rgba(67,155,106,0.2)',  color:'#439B6A',border:'rgba(67,155,106,0.4)', text:'Preenchido'},
      partial:{bg:'rgba(212,175,55,0.15)', color:'#D4AF37',border:'rgba(212,175,55,0.35)',text:'Parcial'},
      pending:{bg:'rgba(224,92,92,0.15)',  color:'#e05c5c',border:'rgba(224,92,92,0.3)', text:'Pendente'},
    }[status]||{bg:'#222',color:'#555',border:'#333',text:'—'};
    return(
      <span title={tooltip||''} style={{display:'inline-flex',alignItems:'center',gap:5,cursor:tooltip?'help':'default'}}>
        <span style={{background:cfg.bg,color:cfg.color,border:`1px solid ${cfg.border}`,padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}>{cfg.text}</span>
        {label2&&<span style={{fontSize:11,color:'#888'}}>{label2}</span>}
        {tooltip&&status!=='ok'&&<span style={{fontSize:10,color:'#555',cursor:'help'}} title={tooltip}>ⓘ</span>}
      </span>
    );
  }

  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
        <div>
          <h2 className="serif" style={{fontSize:22,color:C.cream}}>Controle de Dados</h2>
          <p style={{fontSize:12,color:C.teal,marginTop:2}}>Status de preenchimento dos registros por campus — passe o mouse sobre o badge para ver o que falta</p>
        </div>
        <PeriodSelector value={period} onChange={setPeriod}/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
        <Card style={{textAlign:'center'}}>
          <div style={{fontSize:10,color:'#439B6A',textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>Completos</div>
          <div className="serif" style={{fontSize:36,color:'#439B6A',fontWeight:700,lineHeight:1}}>{totalOk}</div>
          <div style={{fontSize:11,color:'#777',marginTop:4}}>campus 100% preenchidos</div>
        </Card>
        <Card style={{textAlign:'center'}}>
          <div style={{fontSize:10,color:'#D4AF37',textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>Parciais</div>
          <div className="serif" style={{fontSize:36,color:'#D4AF37',fontWeight:700,lineHeight:1}}>{totalPartial}</div>
          <div style={{fontSize:11,color:'#777',marginTop:4}}>com dados incompletos</div>
        </Card>
        <Card style={{textAlign:'center'}}>
          <div style={{fontSize:10,color:'#e05c5c',textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>Pendentes</div>
          <div className="serif" style={{fontSize:36,color:'#e05c5c',fontWeight:700,lineHeight:1}}>{totalNone}</div>
          <div style={{fontSize:11,color:'#777',marginTop:4}}>sem nenhum dado</div>
        </Card>
      </div>

      {/* Filtros: Campus */}
      <div>
        <div style={{fontSize:10,color:C.teal,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Campus</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <button onClick={()=>setLocFilter('all')} style={{padding:'5px 14px',borderRadius:20,border:'none',cursor:'pointer',fontSize:11,fontWeight:700,background:locFilter==='all'?C.teal:'rgba(7,135,128,0.12)',color:locFilter==='all'?C.cream:C.teal}}>Todos</button>
          {LOCS.map(l=>(
            <button key={l.id} onClick={()=>setLocFilter(l.id)} style={{padding:'5px 12px',borderRadius:20,border:'none',cursor:'pointer',fontSize:11,fontWeight:600,background:locFilter===l.id?C.teal:'rgba(7,135,128,0.12)',color:locFilter===l.id?C.cream:C.teal}}>{l.flag} {l.name}</button>
          ))}
        </div>
      </div>

      {/* Filtros: Mês */}
      {allMonths.length>1&&(
        <div>
          <div style={{fontSize:10,color:C.teal,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Mês</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            <button onClick={()=>setMonthFilter('all')} style={{padding:'5px 14px',borderRadius:20,border:'none',cursor:'pointer',fontSize:11,fontWeight:700,background:monthFilter==='all'?C.teal:'rgba(7,135,128,0.12)',color:monthFilter==='all'?C.cream:C.teal}}>Todos os meses</button>
            {allMonths.map(mo=>(
              <button key={mo} onClick={()=>setMonthFilter(mo)} style={{padding:'5px 12px',borderRadius:20,border:'none',cursor:'pointer',fontSize:11,fontWeight:600,background:monthFilter===mo?C.teal:'rgba(7,135,128,0.12)',color:monthFilter===mo?C.cream:C.teal}}>{mn(mo)}/{mo.split('-')[0].slice(2)}</button>
            ))}
          </div>
        </div>
      )}

      {/* Cards por campus */}
      {filtered.map(({loc,metRows,okCount,partialCount,total})=>(
        <div key={loc.id} style={{background:'rgba(7,135,128,0.06)',border:'1px solid rgba(7,135,128,0.18)',borderRadius:12,overflow:'hidden'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 20px',borderBottom:'1px solid rgba(7,135,128,0.15)',background:'rgba(7,135,128,0.08)'}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:20}}>{loc.flag}</span>
              <span className="serif" style={{fontSize:17,fontWeight:700,color:C.cream}}>{loc.name}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:120,height:6,background:'rgba(7,135,128,0.2)',borderRadius:3,overflow:'hidden'}}>
                <div style={{width:`${Math.round(okCount/total*100)}%`,height:'100%',background:okCount===total?'#439B6A':okCount>0?'#D4AF37':'#e05c5c',borderRadius:3}}/>
              </div>
              <span style={{fontSize:12,fontWeight:700,color:okCount===total?'#439B6A':okCount>0?'#D4AF37':'#e05c5c',whiteSpace:'nowrap'}}>{okCount}/{total} preenchidos</span>
            </div>
          </div>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead>
              <tr style={{borderBottom:'1px solid rgba(7,135,128,0.12)'}}>
                <th style={{textAlign:'left',padding:'8px 20px',color:C.teal,fontWeight:600,fontSize:11,width:'30%'}}>Tipo de Registro</th>
                <th style={{textAlign:'left',padding:'8px 12px',color:C.teal,fontWeight:600,fontSize:11,width:'28%'}}>Status</th>
                <th style={{textAlign:'right',padding:'8px 20px',color:C.teal,fontWeight:600,fontSize:11}}>Detalhes</th>
              </tr>
            </thead>
            <tbody>
              {metRows.map((m,i)=>(
                <tr key={m.key} style={{borderBottom:i<metRows.length-1?'1px solid rgba(7,135,128,0.08)':'none',background:i%2===0?'transparent':'rgba(7,135,128,0.03)'}}>
                  <td style={{padding:'10px 20px',color:C.cream,fontWeight:500}}>{m.label}</td>
                  <td style={{padding:'10px 12px'}}><Badge status={m.status} label2={m.isSun?m.label2:m.label2} tooltip={m.tooltip}/></td>
                  <td style={{padding:'10px 20px',textAlign:'right'}}>
                    {m.isSun?(
                      <div style={{display:'flex',gap:5,justifyContent:'flex-end',flexWrap:'wrap'}}>
                        {m.monthDetails.map(({mo,filled,expected,missing})=>{
                          const ok2=filled>=expected&&expected>0;
                          const partial2=filled>0&&!ok2;
                          const tip=ok2?`${mn(mo)}: ${filled}/${expected} cultos ✓`:
                            missing>0?`${mn(mo)}: ${filled}/${expected} — faltam ${missing} culto${missing>1?'s':''}`:
                            `${mn(mo)}: sem cultos esperados`;
                          return(
                            <span key={mo} title={tip} style={{fontSize:10,padding:'2px 9px',borderRadius:10,fontWeight:600,cursor:'help',
                              background:ok2?'rgba(67,155,106,0.2)':partial2?'rgba(212,175,55,0.15)':'rgba(224,92,92,0.1)',
                              color:ok2?'#439B6A':partial2?'#D4AF37':'#e05c5c',
                              border:`1px solid ${ok2?'rgba(67,155,106,0.35)':partial2?'rgba(212,175,55,0.3)':'rgba(224,92,92,0.3)'}`
                            }}>
                              {mn(mo)}: {filled}/{expected}
                            </span>
                          );
                        })}
                      </div>
                    ):(
                      <div style={{display:'flex',gap:5,justifyContent:'flex-end',flexWrap:'wrap'}}>
                        {m.monthDetails.map(({mo,val,filled:mf})=>{
                          const tip=mf?`${mn(mo)}: ${val.toLocaleString('pt-BR')}`:`${mn(mo)}: pendente`;
                          return(
                            <span key={mo} title={tip} style={{fontSize:10,padding:'2px 9px',borderRadius:10,fontWeight:600,cursor:'help',
                              background:mf?'rgba(67,155,106,0.2)':'rgba(224,92,92,0.1)',
                              color:mf?'#439B6A':'#e05c5c',
                              border:`1px solid ${mf?'rgba(67,155,106,0.35)':'rgba(224,92,92,0.3)'}`
                            }}>
                              {mn(mo)}{mf?`: ${val.toLocaleString('pt-BR')}`:'—'}
                            </span>
                          );
                        })}
                      </div>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      ))}
    </div>
  );
}

function gerAvg(locId,months,cat){
  let s=0,n=0;
  months.forEach(m=>{const d=GER_DATA[locId]?.[m];if(d){s+=d[cat+'S']||0;n+=d[cat+'N']||0;}});
  return n>0?Math.round(s/n):0;
}
function PageGeracionais(){
  const [period,setPeriod]=useState('2026-S1');
  const [selLocs,setSelLocs]=useState(LOCS.map(l=>l.id));
  const filtLocs=LOCS.filter(l=>selLocs.includes(l.id));
  const [locId,setLocId]=useState('São Paulo');
  const months=pMonths(period);
  const loc=LOCS.find(l=>l.id===locId);
  const hasData=GER_DATA[locId]&&months.some(m=>GER_DATA[locId][m]);

  /* meses Jan-Jun para comparativo 2025 vs 2026 */
  const GEN_MM=['01','02','03','04','05','06'];
  const GEN_ML=['Jan','Fev','Mar','Abr','Mai','Jun'];

  /* dados para gráfico por geracional: 2025 vs 2026 (agregado por filtLocs) */
  function genTrendData(catKey){
    return GEN_MM.map(function(mm,i){
      var m25='2025-'+mm, m26='2026-'+mm;
      var s25=0,n25=0,s26=0,n26=0;
      filtLocs.forEach(function(l){
        var d25=GER_DATA[l.id]&&GER_DATA[l.id][m25];
        var d26=GER_DATA[l.id]&&GER_DATA[l.id][m26];
        if(d25){s25+=d25[catKey+'S']||0;n25+=d25[catKey+'N']||0;}
        if(d26){s26+=d26[catKey+'S']||0;n26+=d26[catKey+'N']||0;}
      });
      return{
        name:GEN_ML[i],
        y2025:n25>0?Math.round(s25/n25):null,
        y2026:n26>0?Math.round(s26/n26):null,
      };
    });
  }

  /* stacked bar mensal (localidade única) */
  const monthlyData=months.map(m=>{
    const d=GER_DATA[locId]?.[m]||{};
    const row={name:fmtMonth(m)};let tot=0;
    GEN_CATS.forEach(c=>{const v=(d[c.key+'N']||0)>0?Math.round(d[c.key+'S']/d[c.key+'N']):0;row[c.key]=v;tot+=v;});
    row.total=tot;return row;
  });

  /* média ponderada global por geracional — usa filtLocs */
  const globalByGen=GEN_CATS.map(c=>{
    let s=0,n=0;
    filtLocs.forEach(l=>{months.forEach(m=>{
      const d=GER_DATA[l.id]?.[m];
      if(d){s+=d[c.key+'S']||0;n+=d[c.key+'N']||0;}
    });});
    return{name:c.label,val:n>0?Math.round(s/n):0,color:c.color};
  });

  const kpiData=GEN_CATS.map(c=>({...c,val:gerAvg(locId,months,c.key)}));

  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      {/* cabeçalho */}

          <LocMultiFilter selected={selLocs} onChange={setSelLocs}/>
          <PeriodSelector value={period} onChange={setPeriod}/>
        </div>
      </div>

      {/* ── SEÇÃO: gráficos individuais por geracional (2025 vs 2026) ── */}
      <div>
        <div style={{fontSize:13,color:C.teal,fontWeight:700,marginBottom:12,letterSpacing:0.5,textTransform:'uppercase'}}>Evolução por Geracional — Méd/Semana (Jan–Jun)</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(380px,1fr))',gap:16}}>
          {GEN_CATS.map(function(cat){
            var tdata=genTrendData(cat.key);
            var has25=tdata.some(function(r){return r.y2025!=null;});
            var has26=tdata.some(function(r){return r.y2026!=null;});
            return(
              <Card key={cat.key}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                  <span style={{display:'inline-block',width:10,height:10,borderRadius:'50%',background:cat.color}}></span>
                  <span style={{fontSize:13,fontWeight:700,color:cat.color,letterSpacing:0.5}}>{cat.label}</span>
                </div>
                {(!has25&&!has26)?<div style={{color:'#555',fontSize:12,padding:20,textAlign:'center'}}>Sem dados</div>:(
                <ResponsiveContainer width="100%" height={200}>
                  <LineChart data={tdata} margin={{top:18,right:12,bottom:0,left:0}}>
                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(7,135,128,0.12)"/>
                    <XAxis dataKey="name" tick={{fill:C.teal,fontSize:11}} axisLine={false} tickLine={false}/>
                    <YAxis tick={{fill:C.teal,fontSize:10}} axisLine={false} tickLine={false} tickFormatter={function(v){return v.toLocaleString('pt-BR');}} width={32}/>
                    <Tooltip content={<TT/>} formatter={function(v,name){return[v.toLocaleString('pt-BR'),'méd/sem'];}}/>
                    <Legend wrapperStyle={{fontSize:11,color:C.cream}}/>
                    {has25&&<Line isAnimationActive={false} type="monotone" dataKey="y2025" name="2025" stroke={C.mid} strokeWidth={2} dot={{r:3,fill:C.mid}} connectNulls={true}>
                      <LabelList dataKey="y2025" position="top" style={{fill:C.cream,fontSize:10}} formatter={function(v){return v!=null?v.toLocaleString('pt-BR'):'';}}/>
                    </Line>}
                    {has26&&<Line isAnimationActive={false} type="monotone" dataKey="y2026" name="2026" stroke={cat.color} strokeWidth={2} dot={{r:3,fill:cat.color}} connectNulls={true}>
                      <LabelList dataKey="y2026" position="top" style={{fill:C.cream,fontSize:10}} formatter={function(v){return v!=null?v.toLocaleString('pt-BR'):'';}}/>
                    </Line>}
                  </LineChart>
                </ResponsiveContainer>
                )}
              </Card>
            );
          })}

          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:12,marginBottom:16}}>

            <ResponsiveContainer width="100%" height={300}>
              <BarChart data={monthlyData} margin={{top:20,right:8,bottom:0,left:0}}>

            <ChartTitle>Méd/Semana por Geracional — Igrejas Filtradas ({PERIODS[period]&&PERIODS[period].label})</ChartTitle>

                    <td key={c.key} style={{padding:'5px 8px',textAlign:'right',color:r[c.key]>0?C.cream:'#444'}}>
                      {r[c.key]>0?r[c.key].toLocaleString('pt-BR'):'—'}
                      {r.total>0&&r[c.key]>0&&<span style={{fontSize:9,color:'#666',marginLeft:3}}>{Math.round(r[c.key]/r.total*100)}%</span>}
                    </td>
                  ))}
                  <td style={{padding:'5px 8px',textAlign:'right',fontWeight:700,color:C.teal}}>{r.total.toLocaleString('pt-BR')}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        )}
      </Card>
    </div>
  );
}

/* ═══ PAGE: PRÉDIOS VS PÚBLICO */
/* tier = classificação oficial da rede (campo fixo, não calculado por fórmula de cadeiras)
   HOTEL = campus que ainda não tem prédio próprio, funciona em hotel/espaço alugado */
const PRED_DATA={
  'São Paulo':      {seats:2500,cultos:4,tier:'DIAMOND', name:'Galpão São Paulo'},
  'Recife':         {seats:900, cultos:4,tier:'GOLD',    name:'Sede Recife'},
  'Campinas':       {seats:600, cultos:3,tier:'SILVER',  name:'Sede Campinas'},
  'Santos':         {seats:400, cultos:1,tier:'GOLD',    name:'Sede Santos'},
  'Ribeirão Preto': {seats:350, cultos:1,tier:'PLATINUM',name:'Sede Ribeirão Preto'},
  'Maceió':         {seats:300, cultos:2,tier:'SILVER',  name:'Sede Maceió'},
  'Jundiaí':        {seats:250, cultos:2,tier:'SILVER',  name:'Sede Jundiaí'},
  'Campo Grande':   {seats:300, cultos:1,tier:'GOLD',    name:'Sede Campo Grande'},
  'Vale do Ribeira':{seats:150, cultos:1,tier:'GOLD',    name:'Sede Vale do Ribeira'},
  'SJCampos':       {seats:200, cultos:1,tier:'HOTEL',   name:'Sede SJCampos (mensal)'},
  'Vitória':        {seats:200, cultos:1,tier:'HOTEL',   name:'Sede Vitória (mensal)'},
  'Lisboa':         {seats:300, cultos:3,tier:'GOLD',    name:'Sede Lisboa'},
  'Porto':          {seats:200, cultos:1,tier:'SILVER',  name:'Sede Porto'},
  'Cascais':        {seats:150, cultos:1,tier:'HOTEL',   name:'Sede Cascais'},
  'Quito':          {seats:250, cultos:3,tier:'GOLD',    name:'Sede Quito'},
  'Cuenca':         {seats:150, cultos:1,tier:'SILVER',  name:'Sede Cuenca'},
  'Santiago':       {seats:250, cultos:1,tier:'SILVER',  name:'Sede Santiago'},
  'Miami':          {seats:200, cultos:1,tier:'SILVER',  name:'Sede Miami'},
  'Orlando':        {seats:150, cultos:1,tier:'SILVER',  name:'Sede Orlando'},
};
/* cap total = seats × cultos */
Object.values(PRED_DATA).forEach(d=>{d.cap=d.seats*d.cultos;});
function PagePredios(){
  const [period,setPeriod]=useState('2026-S1');
  const months=pMonths(period);

  const rows=LOCS.map(loc=>{
    const pred=PRED_DATA[loc.id]||{seats:0,cultos:1,cap:0,name:loc.name,tier:'—'};
    const people=avgSunday(loc.id,months);
    const isHotel=pred.tier==='HOTEL';
    const utilPct=(!isHotel&&pred.cap>0)?Math.round(people/pred.cap*100):0;
    const buildTier=getBldgTierByName(pred.tier||'—');
    const peopleTier=getTier(people);
    return{loc,pred,people,utilPct,buildTier,peopleTier,isHotel};
  }).sort((a,b)=>b.utilPct-a.utilPct);

  const chartData=rows.map(r=>({name:r.loc.name,seats:r.pred.seats,cap:r.pred.cap,people:r.people,util:r.utilPct}));

  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
        <div>
          <h2 className="serif" style={{fontSize:22,color:C.cream}}>Prédio vs Público</h2>
          <p style={{fontSize:12,color:C.teal,marginTop:2}}>Cadeiras do templo × cultos por domingo = capacidade total (Gold) | Presença de pessoas (Silver) — taxa de ocupação por campus</p>
        </div>
        <PeriodSelector value={period} onChange={setPeriod}/>
      </div>
      <div style={{background:'rgba(123,92,62,0.15)',border:'1px solid rgba(123,92,62,0.4)',borderRadius:10,padding:'12px 16px',fontSize:12,color:'#c8a07a',display:'flex',gap:8,alignItems:'center'}}>
        🏨 <span><b>HOTEL</b> = campus sem prédio próprio (SJCampos, Vitória, Cascais) — funcionam em espaço alugado. Ocupação não calculada para esses.</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:12}}>
        <Card style={{textAlign:'center'}}>
          <div style={{fontSize:10,color:C.teal,textTransform:'uppercase',letterSpacing:1,marginBottom:5}}>Cadeiras (Templo)</div>
          <div className="serif" style={{fontSize:24,fontWeight:700,color:'#D4AF37'}}>{rows.filter(r=>!r.isHotel).reduce((s,r)=>s+(r.pred.seats||0),0).toLocaleString('pt-BR')}</div>
          <div style={{fontSize:10,color:'#777',marginTop:2}}>{rows.filter(r=>!r.isHotel).length} sedes próprias</div>
        </Card>
        <Card style={{textAlign:'center'}}>
          <div style={{fontSize:10,color:C.teal,textTransform:'uppercase',letterSpacing:1,marginBottom:5}}>Cap. Total (×Cultos)</div>
          <div className="serif" style={{fontSize:24,fontWeight:700,color:'#c8a020'}}>{rows.filter(r=>!r.isHotel).reduce((s,r)=>s+r.pred.cap,0).toLocaleString('pt-BR')}</div>
          <div style={{fontSize:10,color:'#777',marginTop:2}}>assentos × cultos/dom</div>
        </Card>
        <Card style={{textAlign:'center'}}>
          <div style={{fontSize:10,color:C.teal,textTransform:'uppercase',letterSpacing:1,marginBottom:5}}>Presença Total</div>
          <div className="serif" style={{fontSize:24,fontWeight:700,color:'#A8A9AD'}}>{rows.reduce((s,r)=>s+r.people,0).toLocaleString('pt-BR')}</div>
          <div style={{fontSize:10,color:'#777',marginTop:2}}>média por domingo</div>
        </Card>
        <Card style={{textAlign:'center'}}>
          <div style={{fontSize:10,color:C.teal,textTransform:'uppercase',letterSpacing:1,marginBottom:5}}>Ocupação Média</div>
          <div className="serif" style={{fontSize:24,fontWeight:700,color:C.teal}}>
            {(()=>{const ok=rows.filter(r=>!r.isHotel&&r.pred.cap>0);return ok.length>0?Math.round(ok.reduce((s,r)=>s+r.utilPct,0)/ok.length):0;})()}%
          </div>
          <div style={{fontSize:10,color:'#777',marginTop:2}}>sedes próprias</div>
        </Card>
      </div>
      <Card>
        <ChartTitle>Cadeiras / Cap.Total (×Cultos) / Presença — {PERIODS[period]?.label}</ChartTitle>
        <ResponsiveContainer width="100%" height={380}>
          <BarChart data={chartData} margin={{top:22,right:8,bottom:55,left:0}}>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(7,135,128,0.12)"/>
            <XAxis dataKey="name" tick={{fill:C.cream,fontSize:10}} angle={-40} textAnchor="end" interval={0} axisLine={false} tickLine={false} height={60}/>
            <YAxis tick={{fill:C.teal,fontSize:11}} axisLine={false} tickLine={false} tickFormatter={v=>v.toLocaleString('pt-BR')}/>
            <Tooltip content={<TT/>}/>
            <Legend wrapperStyle={{fontSize:12,color:C.cream}}/>
            <Bar isAnimationActive={false} dataKey="seats" name="Cadeiras (templo)" fill="#8B6914" radius={[3,3,0,0]}/>
            <Bar isAnimationActive={false} dataKey="cap" name="Cap. Total (×cultos)" fill="#D4AF37" radius={[3,3,0,0]}>
              <LabelList dataKey="cap" position="top" style={{fill:'#D4AF37',fontSize:9}} formatter={v=>v.toLocaleString('pt-BR')}/>
            </Bar>
            <Bar isAnimationActive={false} dataKey="people" name="Presença/Dom (Silver)" fill="#A8A9AD" radius={[3,3,0,0]}>
              <LabelList dataKey="people" position="top" style={{fill:C.cream,fontSize:9}} formatter={v=>v.toLocaleString('pt-BR')}/>
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </Card>
      <Card>
        <ChartTitle>Tabela — Prédio vs Pessoas com Selos e Taxa de Ocupação</ChartTitle>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
            <thead><tr>
              <th style={{textAlign:'left',padding:'7px 8px',color:C.teal,borderBottom:'1px solid rgba(7,135,128,0.3)',whiteSpace:'nowrap'}}>Campus</th>
              <th style={{textAlign:'left',padding:'7px 8px',color:C.teal,borderBottom:'1px solid rgba(7,135,128,0.3)'}}>Prédio</th>
              <th style={{textAlign:'center',padding:'7px 8px',color:'#8B6914',borderBottom:'1px solid rgba(7,135,128,0.3)'}}>Cadeiras</th>
              <th style={{textAlign:'center',padding:'7px 8px',color:'#D4AF37',borderBottom:'1px solid rgba(7,135,128,0.3)'}}>Cultos/Dom</th>
              <th style={{textAlign:'center',padding:'7px 8px',color:'#D4AF37',borderBottom:'1px solid rgba(7,135,128,0.3)'}}>Cap. Total</th>
              <th style={{textAlign:'center',padding:'7px 8px',color:'#D4AF37',borderBottom:'1px solid rgba(7,135,128,0.3)'}}>Selo Prédio</th>
              <th style={{textAlign:'center',padding:'7px 8px',color:'#A8A9AD',borderBottom:'1px solid rgba(7,135,128,0.3)'}}>Pessoas/Dom</th>
              <th style={{textAlign:'center',padding:'7px 8px',color:'#A8A9AD',borderBottom:'1px solid rgba(7,135,128,0.3)'}}>Selo Pessoas</th>
              <th style={{textAlign:'center',padding:'7px 8px',color:C.teal,borderBottom:'1px solid rgba(7,135,128,0.3)'}}>Ocupação</th>
            </tr></thead>
            <tbody>
              {rows.map(r=>(
                <tr key={r.loc.id} style={{borderBottom:'1px solid rgba(7,135,128,0.08)'}}>
                  <td style={{padding:'5px 8px',color:C.cream,whiteSpace:'nowrap'}}>{r.loc.flag} {r.loc.name}</td>
                  <td style={{padding:'5px 8px',color:'#aaa',fontSize:10}}>{r.pred.name}</td>
                  <td style={{padding:'5px 8px',textAlign:'center',color:'#8B6914',fontWeight:600}}>{(r.pred.seats||0).toLocaleString('pt-BR')}</td>
                  <td style={{padding:'5px 8px',textAlign:'center',color:'#D4AF37',fontWeight:700}}>{r.pred.cultos||1}×</td>
                  <td style={{padding:'5px 8px',textAlign:'center',fontWeight:700,color:'#D4AF37'}}>{r.pred.cap.toLocaleString('pt-BR')}</td>
                  <td style={{padding:'5px 8px',textAlign:'center'}}>
                    <span style={{background:r.buildTier.color,color:r.buildTier.text,padding:'1px 7px',borderRadius:8,fontSize:9,fontWeight:700}}>{r.buildTier.name}</span>
                  </td>
                  <td style={{padding:'5px 8px',textAlign:'center',fontWeight:700,color:'#A8A9AD'}}>{r.people.toLocaleString('pt-BR')}</td>
                  <td style={{padding:'5px 8px',textAlign:'center'}}>
                    <span style={{background:r.peopleTier.color,color:r.peopleTier.text,padding:'1px 7px',borderRadius:8,fontSize:9,fontWeight:700}}>{r.peopleTier.name}</span>
                  </td>
                  <td style={{padding:'5px 8px',textAlign:'center',fontWeight:700,color:r.isHotel?'#7B5C3E':r.utilPct>=80?'#439B6A':r.utilPct>=50?'#D4AF37':'#e05c5c'}}>
                    {r.isHotel?'🏨 —':r.utilPct+'%'}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

/* ═══ SIDEBAR */
const PAGES=[
  {id:'ranking',    label:'Ranking de Localidades', icon:'🏅'},
  {id:'global',     label:'Visão Global',            icon:'🌍'},
  {id:'local',      label:'Zion Local',              icon:'📍'},
  {id:'cultos',     label:'Cultos — Domingos',       icon:'⛪'},
  {id:'batismo',    label:'Batismo',                 icon:'💧'},
  {id:'links',      label:'Links',                   icon:'🔗'},
  {id:'plinks',     label:'Pessoas em Links',        icon:'👥'},
  {id:'voluntarios',label:'Voluntários',             icon:'🙋'},
  {id:'raizes',     label:'Raízes Finalizados',      icon:'🌱'},
  {id:'zao',        label:'ZAO',                     icon:'📚'},
  {id:'digital',    label:'Presença Digital',        icon:'📱'},
  {id:'taxas',      label:'Taxas Estratégicas',      icon:'📊'},
  {id:'geracionais',label:'Geracionais',             icon:'👶'},
  {id:'predios',    label:'Prédio vs Público',       icon:'🏛️'},
  {id:'dados',      label:'Controle de Dados',       icon:'✅'},
];

function Sidebar({page,setPage,collapsed,setCollapsed}){
  return(
    <aside style={{width:collapsed?52:222,minWidth:collapsed?52:222,background:'#021a1a',borderRight:'1px solid rgba(7,135,128,0.2)',display:'flex',flexDirection:'column',position:'sticky',top:0,height:'100vh',overflowY:'auto',overflowX:'hidden',transition:'width 0.22s,min-width 0.22s'}}>
      <div style={{padding:collapsed?'14px 0':'14px 16px',borderBottom:'1px solid rgba(7,135,128,0.2)',display:'flex',alignItems:'center',justifyContent:collapsed?'center':'space-between',cursor:'pointer',minHeight:56,flexShrink:0}} onClick={()=>setCollapsed(!collapsed)}>
        {!collapsed&&<div className="serif" style={{fontSize:19,fontWeight:700,color:C.cream,letterSpacing:2}}>ZION</div>}
        <div style={{color:C.teal,fontSize:16,lineHeight:1}}>{collapsed?'▶':'◀'}</div>
      </div>
      <nav style={{flex:1,padding:'6px 0',overflowY:'auto'}}>
        {PAGES.map(p=>(
          <button key={p.id} onClick={()=>setPage(p.id)} title={collapsed?p.label:''} style={{width:'100%',padding:collapsed?'10px 0':'9px 14px',background:page===p.id?'rgba(7,135,128,0.22)':'transparent',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:9,color:page===p.id?C.cream:C.teal,fontSize:12,fontWeight:page===p.id?600:400,textAlign:'left',justifyContent:collapsed?'center':'flex-start',borderLeft:page===p.id?`3px solid ${C.teal}`:'3px solid transparent'}}>
            <span style={{fontSize:15,minWidth:20,textAlign:'center'}}>{p.icon}</span>
            {!collapsed&&<span style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.label}</span>}
          </button>
        ))}
      </nav>
      {!collapsed&&<div style={{padding:'10px 14px',borderTop:'1px solid rgba(7,135,128,0.2)',fontSize:10,color:'rgba(7,135,128,0.4)',textAlign:'center',flexShrink:0}}>© 2026 Zion Church</div>}
    </aside>
  );
}

/* ═══ APP */
function App(){
  const [authed,setAuthed]=useState(false);
  const [page,setPage]=useState('global');
  const [collapsed,setCollapsed]=useState(false);
  if(!authed)return<Login onLogin={()=>setAuthed(true)}/>;
  function renderPage(){
    switch(page){
      case 'ranking':     return<PageRanking/>;
      case 'global':      return<PageGlobal/>;
      case 'local':       return<PageLocal/>;
      case 'cultos':      return<PageCultos/>;
      case 'batismo':     return<MetricPage title="Total de Batismos" pageTitle="Batismo" field="bap" isStock={false} aggFn={sumFlow} description="Total de batismos realizados no período — métrica de fluxo (soma acumulada dos meses)" color={C.teal} compTitle="Total de Batismos"/>;
      case 'links':       return<MetricPage title="Links Ativos" pageTitle="Links" field="links" isStock={true} aggFn={lastVal} description="Quantidade de links ativos — valor do último mês do período selecionado (métrica de estoque)" color={C.teal} compTitle="Links Ativos"/>;
      case 'plinks':      return<MetricPage title="Pessoas em Links" field="plinks" isStock={true} aggFn={lastVal} description="Pessoas participando de links — valor do último mês (métrica de estoque, não soma os meses)" color={C.sage} compTitle="Pessoas em Links"/>;
      case 'voluntarios': return<MetricPage title="Voluntários Ativos" pageTitle="Voluntários" field="vol" isStock={true} aggFn={maxVal} description="Voluntários ativos — valor do último mês do período (métrica de estoque)" color={C.sage} compTitle="Voluntários Ativos"/>;
      case 'raizes':      return<MetricPage title="Raízes Finalizados" pageTitle="Raízes Finalizados" field="raiz" isStock={false} aggFn={sumFlow} description="Raízes finalizados no período — métrica de fluxo (soma acumulada dos meses)" color={C.teal} compTitle="Raízes Finalizados"/>;
      case 'zao':         return<MetricPage title="Matrículas ZAO" pageTitle="ZAO" field="zao" isStock={true} aggFn={maxVal} description="Matrículas ativas no ZAO — valor do último mês (métrica de estoque)" color={C.teal} compTitle="Matrículas ZAO"/>;
      case 'digital':     return<MetricPage title="Seguidores Instagram" pageTitle="Presença Digital" field="ig" isStock={true} aggFn={lastVal} description="Seguidores no Instagram — valor do último mês do período (métrica de estoque)" color={C.sage} compTitle="Seguidores Instagram"/>;
      case 'taxas':       return<PageTaxas/>;
      case 'geracionais': return<PageGeracionais/>;
      case 'predios':     return<PagePredios/>;
      case 'dados':       return<PageDataControl/>;
      default:            return<PageGlobal/>;
    }
  }
  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar page={page} setPage={setPage} collapsed={collapsed} setCollapsed={setCollapsed}/>
      <main style={{flex:1,overflowY:'auto',padding:'24px',background:`linear-gradient(180deg,#032525 0%,${C.deepGreen} 100%)`}}>
        {renderPage()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
